version: 1.0.0
creation_date: '2026-03-04'
package_title: HDSI AI Scripted CLI Invocation
description: "Detect scripted AI CLI invocations where interpreter or shell processes launch AI CLIs. Covers all known AI CLI tools. MITRE: T1059.004"
author: Hurricane Labs
app_compatibility:
  - app_name: SplunkEnterpriseSecuritySuite
    operator: '*'
    required_version: '*'
app_context: HurricaneLabsContentUpdates
enable_alerting: false
common_dependencies:
  - macros:ai_process_filter
  - macros:ai_unsanctioned_filter
tags:
  - rba_only
  - process
  - endpoint
data_prereqs:
  datamodels:
    op: AND
    items:
    - "Endpoint.Processes"
deployment_type: global
prereq_packages:
  - hdsi_ai_rba_common
