[Endpoint - HDSI AI Scripted CLI Invocation - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI Scripted CLI Invocation
action.correlationsearch.annotations = {"mitre_attack": ["T1059.004"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.rule_title = HDSI AI Scripted CLI Invocation ($user$)
action.notable.param.rule_description = Scripted AI CLI invocation by $user$ on $src$ ($parent_process_name$ -> $process_name$).
action.notable.param.security_domain = endpoint
action.notable.param.severity = medium
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View related process activity","search":"| tstats summariesonly=t count min(_time) as firstTime max(_time) as lastTime values(Processes.process) as process values(Processes.process_name) as process_name values(Processes.parent_process_name) as parent_process_name by Processes.user Processes.dest | rename Processes.* as * | eval src=coalesce(src,dest) | search user=\"$user$\" OR src=\"$src$\" | table firstTime, lastTime, user, src, process_name, process, parent_process_name, count | sort - count","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.verbose = 0
action.risk = 1
action.risk.param._risk_message = Scripted AI CLI invocation by $user$ on $src$ ($parent_process_name$ -> $process_name$).
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score": 32},{"risk_object_field":"src","risk_object_type":"system","risk_score": 18}]
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.digest_mode = 1
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user,src,process_name,parent_process_name
alert.suppress.period = 3600s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 3-59/5 * * * *
description = Detect scripted AI CLI invocations where interpreter or shell processes launch AI CLIs. Covers all known AI CLI tools. MITRE: T1059.004
disabled = 0
dispatch.earliest_time = -15m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count min(_time) as firstTime max(_time) as lastTime values(Processes.process) as process values(Processes.parent_process) as parent_process from datamodel=Endpoint.Processes where Processes.process_name IN ("codex","codex.exe","claude","claude.exe","gemini","gemini.exe","gh-copilot","gh-copilot.exe","aider","aider.exe","sgpt","sgpt.exe","llm","llm.exe","tgpt","tgpt.exe","mods","mods.exe","fabric","fabric.exe","aichat","aichat.exe","amazon-q","amazon-q.exe","openai","openai.exe","cline","cline.exe") AND Processes.parent_process_name IN ("python","python3","bash","zsh","sh","pwsh","powershell","powershell.exe","cmd","cmd.exe","node","npm","npx","make","osascript","wscript","cscript","ruby","perl") by Processes.user Processes.dest Processes.process_name Processes.parent_process_name \
	| rename Processes.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(dest,"unknown"), process_name_lc=lower(process_name), parent_process_name_lc=lower(parent_process_name) \
	| `ai_process_filter` \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| eval ai_activity="scripted_cli_execution", detection_id="AI-008", mitre_attack="T1059.004", ai_kill_chain_phase="execution" \
	| `hdsi_ai_scripted_cli_invocation_filter` \
	| `hdsi_ai_scripted_cli_invocation_customizations`
