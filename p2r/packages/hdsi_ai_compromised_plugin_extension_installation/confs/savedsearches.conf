[Endpoint - HDSI AI Compromised Plugin/Extension Installation - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI Compromised Plugin/Extension Installation
action.correlationsearch.annotations = {"mitre_attack": ["T1195.002"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.rule_title = HDSI AI Compromised Plugin/Extension Installation ($user$)
action.notable.param.rule_description = Suspicious AI plugin/extension installation by $user$ on $src$. Methods: $install_methods$. Commands: $install_commands$.
action.notable.param.security_domain = endpoint
action.notable.param.severity = medium
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View related web activity","search":"| tstats summariesonly=t count sum(Web.bytes_out) as bytes_out sum(Web.bytes_in) as bytes_in values(Web.url) as url values(Web.http_user_agent) as http_user_agent values(Web.dest) as dest min(_time) as firstTime max(_time) as lastTime from datamodel=Web where Web.url_domain=* by Web.user Web.src Web.url_domain | rename Web.* as * | search user=\"$user$\" OR src=\"$src$\" | eval mb_out=round(bytes_out/1024/1024,2), mb_in=round(bytes_in/1024/1024,2) | table firstTime, lastTime, user, src, url_domain, count, mb_out, mb_in, dest, http_user_agent, url | sort - count","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.verbose = 0
action.risk = 1
action.risk.param._risk_message = Suspicious AI plugin/extension installation by $user$ on $src$. Methods: $install_methods$. Commands: $install_commands$.
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score": 35},{"risk_object_field":"src","risk_object_type":"system","risk_score": 20}]
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.digest_mode = 1
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user,src
alert.suppress.period = 3600s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 1-59/5 * * * *
description = Detect installation of known-compromised or suspicious AI plugins/extensions via package managers or browser extension stores. MITRE: T1195.002
disabled = 0
dispatch.earliest_time = -15m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count min(_time) as firstTime max(_time) as lastTime values(Processes.process) as process from datamodel=Endpoint.Processes where Processes.process_name IN ("npm","npm.exe","pip","pip3","pip.exe","pip3.exe","code","code.exe","cursor","cursor.exe") by Processes.user Processes.dest Processes.process_name \
	| rename Processes.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(dest,"unknown"), process_lc=lower(coalesce(mvjoin(process," "),"")) \
	| where match(process_lc,"\\b(install|add|extension|plugin)\\b") AND match(process_lc,"(autogpt|agentgpt|gpt-engineer|swe-agent|langchain|autogen|copilot|claude|chatgpt|openai|llama|ollama|lmstudio|deepseek|anthropic|gemini|cursor|windsurf|continue|tabnine|aider)") \
	| eval _source="package_install" \
	| append [| tstats summariesonly=t allow_old_summaries=t count min(_time) as firstTime max(_time) as lastTime values(Web.url) as urls from datamodel=Web where Web.url IN ("*chrome.google.com/webstore*","*addons.mozilla.org*","*marketplace.visualstudio.com*") AND Web.http_method IN ("POST","PUT") by Web.user Web.src \
	| rename Web.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(src,"unknown"), url_lc=lower(coalesce(mvjoin(urls," "),"")) \
	| where match(url_lc,"(autogpt|agentgpt|gpt-engineer|swe-agent|langchain|autogen|copilot|claude|chatgpt|openai|llama|ollama|lmstudio|deepseek|anthropic|gemini|cursor|windsurf|continue|tabnine|aider)") \
	| eval _source="extension_install"] \
	| stats sum(eval(if(_source="package_install",count,0))) as package_install_events sum(eval(if(_source="extension_install",count,0))) as web_install_events values(eval(if(_source="package_install",process_name,null()))) as install_methods values(eval(if(_source="package_install",process,null()))) as install_commands values(eval(if(_source="extension_install",urls,null()))) as install_urls min(firstTime) as firstTime max(lastTime) as lastTime by user src \
	| eval install_events=package_install_events+web_install_events \
	| where install_events>=2 OR (package_install_events>=1 AND web_install_events>=1) \
	| eval provider="AI Plugin" \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| eval ai_activity="compromised_plugin", detection_id="hdsi_ai_compromised_plugin_extension_installation", mitre_attack="T1195.002", ai_kill_chain_phase="persistence" \
	| `hdsi_ai_compromised_plugin_extension_installation_filter` \
	| `hdsi_ai_compromised_plugin_extension_installation_customizations`
