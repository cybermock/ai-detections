version: 1.0.0
package_title: HDSI AI Compromised Plugin/Extension Installation
creation_date: '2026-03-04'
author: Hurricane Labs
description: "Detect installation of known-compromised or suspicious AI plugins/extensions via package managers or browser extension stores. MITRE: T1195.002"
enable_alerting: false
app_context: HurricaneLabsContentUpdates
common_dependencies:
  - macros:ai_unsanctioned_filter
tags:
  - rba_only
  - process
  - endpoint
  - web
app_compatibility:
  - app_name: SplunkEnterpriseSecuritySuite
    operator: ">="
    required_version: "8.0.0"
data_prereqs:
  datamodels:
    op: AND
    items:
    - "Endpoint.Processes"
    - "Web"
deployment_type: global
prereq_packages:
  - hdsi_ai_rba_common
