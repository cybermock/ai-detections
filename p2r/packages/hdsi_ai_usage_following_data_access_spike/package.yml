version: 1.0.0
package_title: HDSI AI Usage Following Data Access Spike
creation_date: '2026-03-04'
author: Hurricane Labs
description: "Detect correlation between file access spikes and subsequent AI service uploads, indicating data collection followed by AI exfiltration. MITRE: T1567.002"
enable_alerting: false
app_context: HurricaneLabsContentUpdates
common_dependencies:
  - macros:ai_domains_filter
  - macros:ai_unsanctioned_filter
tags:
  - rba_only
  - endpoint
  - web
  - filesystem
  - data_exfiltration
app_compatibility:
  - app_name: SplunkEnterpriseSecuritySuite
    operator: ">="
    required_version: "8.0.0"
data_prereqs:
  datamodels:
    op: AND
    items:
    - "Endpoint.Filesystem"
    - "Web"
deployment_type: global
prereq_packages:
  - hdsi_ai_rba_common
