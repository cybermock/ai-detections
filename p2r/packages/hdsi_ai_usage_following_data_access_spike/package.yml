author: Hurricane Labs
app_compatibility:
  - app_name: SplunkEnterpriseSecuritySuite
    operator: '*'
    required_version: '*'
app_context: HurricaneLabsContentUpdates
enable_alerting: false
common_dependencies:
  - macros:ai_domains_filter
  - macros:ai_unsanctioned_filter
tags:
  - rba_only
  - endpoint
  - web
  - filesystem
  - data_exfiltration
data_prereqs:
  datamodels:
    op: AND
    items:
    - "Endpoint.Filesystem"
    - "Web"
deployment_type: global
prereq_packages:
  - hdsi_ai_rba_common
