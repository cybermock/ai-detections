[Endpoint - HDSI AI Usage Following Data Access Spike - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI Usage Following Data Access Spike
action.correlationsearch.annotations = {"mitre_attack": ["T1567.002"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.rule_title = HDSI AI Usage Following Data Access Spike ($user$)
action.notable.param.rule_description = Data access spike followed by AI upload: $user$ on $src$ accessed $file_accesses$ files then uploaded $ai_mb$ MB to $provider$.
action.notable.param.security_domain = endpoint
action.notable.param.severity = medium
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View related web activity","search":"| tstats summariesonly=t count sum(Web.bytes_out) as bytes_out sum(Web.bytes_in) as bytes_in values(Web.url) as url values(Web.http_user_agent) as http_user_agent values(Web.dest) as dest min(_time) as firstTime max(_time) as lastTime from datamodel=Web where Web.url_domain=* by Web.user Web.src Web.url_domain | rename Web.* as * | search user=\"$user$\" OR src=\"$src$\" | eval mb_out=round(bytes_out/1024/1024,2), mb_in=round(bytes_in/1024/1024,2) | table firstTime, lastTime, user, src, url_domain, count, mb_out, mb_in, dest, http_user_agent, url | sort - count","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.verbose = 0
action.risk = 1
action.risk.param._risk_message = Data access spike followed by AI upload: $user$ on $src$ accessed $file_accesses$ files then uploaded $ai_mb$ MB to $provider$.
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score": 40},{"risk_object_field":"src","risk_object_type":"system","risk_score": 20}]
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.digest_mode = 1
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user,src,provider
alert.suppress.period = 3600s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 3-59/5 * * * *
description = Detect correlation between file access spikes and subsequent AI service uploads, indicating data collection followed by AI exfiltration. MITRE: T1567.002
disabled = 0
dispatch.earliest_time = -15m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count values(Filesystem.file_path) as file_paths from datamodel=Endpoint.Filesystem where Filesystem.action IN ("read","created","modified","accessed","opened") by Filesystem.user Filesystem.dest _time span=1h \
	| rename Filesystem.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(dest,"unknown") \
	| eval control_name="data_access_spike_count" \
	| lookup ai_detection_config control_name OUTPUTNEW value as access_threshold \
	| eval access_threshold=coalesce(tonumber(access_threshold),100) \
	| where count>=access_threshold \
	| eval _source="file_access" \
	| append [| tstats summariesonly=t allow_old_summaries=t count sum(Web.bytes_out) as bytes_out min(_time) as firstTime max(_time) as lastTime from datamodel=Web where Web.url_domain=* by Web.user Web.src Web.url_domain _time span=1h \
	| rename Web.* as * \
	| eval ai_domain=lower(url_domain) \
	| `ai_domains_filter` \
	| where isnotnull(provider) \
	| eval user=coalesce(user,"unknown"), src=coalesce(src,"unknown"), _source="ai_web"] \
	| stats sum(eval(if(_source="file_access",count,0))) as file_accesses sum(eval(if(_source="ai_web",bytes_out,0))) as ai_bytes values(eval(if(_source="file_access",file_paths,null()))) as accessed_files values(eval(if(_source="ai_web",ai_domain,null()))) as ai_domains values(eval(if(_source="ai_web",provider,null()))) as provider min(firstTime) as firstTime max(lastTime) as lastTime by user src \
	| eval provider=mvindex(provider,0) \
	| where file_accesses>0 AND ai_bytes>0 \
	| eval ai_mb=round(ai_bytes/1024/1024,2) \
	| where ai_mb>1 \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| eval ai_activity="data_access_ai_correlation", detection_id="hdsi_ai_usage_following_data_access_spike", mitre_attack="T1567.002", ai_kill_chain_phase="collection" \
	| `hdsi_ai_usage_following_data_access_spike_filter` \
	| `hdsi_ai_usage_following_data_access_spike_customizations`
