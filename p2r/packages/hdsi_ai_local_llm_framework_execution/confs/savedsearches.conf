alert.digest_mode = 1
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user,src,process_name
alert.suppress.period = 3600s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 4-59/5 * * * *
description = Detect execution of local LLM tooling including ollama, llama.cpp, lmstudio, llamafile, jan, gpt4all, koboldcpp, localai, vllm, mlx, open-webui, and text-generation-launcher. MITRE: T1204.002
disabled = 0
dispatch.earliest_time = -15m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count min(_time) as firstTime max(_time) as lastTime values(Processes.process) as process values(Processes.parent_process_name) as parent_process_name values(Processes.original_file_name) as original_file_name from datamodel=Endpoint.Processes where Processes.process_name IN ("ollama","ollama.exe","lmstudio","lmstudio.exe","llamafile","llamafile.exe","jan","jan.exe","gpt4all","gpt4all.exe","llama-server","llama-server.exe","llama-run","llama-run.exe","llama-cli","llama-cli.exe","koboldcpp","koboldcpp.exe","localai","local-ai","text-generation-launcher","vllm","mlx_lm.server","mlx_lm.generate","open-webui","open-webui.exe","lms","lms.exe","chat.exe") by Processes.user Processes.dest Processes.process_name \
	| rename Processes.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(dest,"unknown"), process_name_lc=lower(process_name) \
	| `ai_process_filter` \
	| where usage_type="local_llm" \
	| eval provider=coalesce(provider,"Local LLM") \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| eval ai_activity="local_llm_execution", detection_id="AI-011", mitre_attack="T1204.002", ai_kill_chain_phase="execution" \
	| `hdsi_ai_local_llm_framework_execution_filter` \
	| `hdsi_ai_local_llm_framework_execution_customizations`
