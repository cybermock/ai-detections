version: 1.0.0
package_title: HDSI AI Browser Extension Activity
creation_date: '2026-03-04'
author: Hurricane Labs
description: "Detect installation or usage of AI browser extensions (ChatGPT, Copilot, Claude, Perplexity) via proxy logs. Browser extensions can intercept page content and exfiltrate to AI services. MITRE: T1176"
enable_alerting: false
app_context: HurricaneLabsContentUpdates
common_dependencies:
  - macros:ai_unsanctioned_filter
tags:
  - rba_only
  - web
  - proxy
app_compatibility:
  - app_name: SplunkEnterpriseSecuritySuite
    operator: ">="
    required_version: "8.0.0"
data_prereqs:
  datamodels:
    op: AND
    items:
    - "Web"
deployment_type: global
prereq_packages:
  - hdsi_ai_rba_common
