[Network - HDSI AI Browser Extension Activity - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI Browser Extension Activity
action.correlationsearch.annotations = {"mitre_attack": ["T1176"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.rule_title = HDSI AI Browser Extension Activity ($user$)
action.notable.param.rule_description = AI browser extension activity detected for $user$ from $src$. URLs: $extension_urls$.
action.notable.param.security_domain = network
action.notable.param.severity = informational
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View related web activity","search":"| tstats summariesonly=t count sum(Web.bytes_out) as bytes_out sum(Web.bytes_in) as bytes_in values(Web.url) as url values(Web.http_user_agent) as http_user_agent values(Web.dest) as dest min(_time) as firstTime max(_time) as lastTime from datamodel=Web where Web.url_domain=* by Web.user Web.src Web.url_domain | rename Web.* as * | search user=\"$user$\" OR src=\"$src$\" | eval mb_out=round(bytes_out/1024/1024,2), mb_in=round(bytes_in/1024/1024,2) | table firstTime, lastTime, user, src, url_domain, count, mb_out, mb_in, dest, http_user_agent, url | sort - count","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.verbose = 0
action.risk = 1
action.risk.param._risk_message = AI browser extension activity detected for $user$ from $src$. URLs: $extension_urls$.
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score": 12},{"risk_object_field":"src","risk_object_type":"system","risk_score": 8}]
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.digest_mode = 1
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user,src
alert.suppress.period = 3600s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 3-59/5 * * * *
description = Detect installation or usage of AI browser extensions (ChatGPT, Copilot, Claude, Perplexity) via proxy logs. Browser extensions can intercept page content and exfiltrate to AI services. MITRE: T1176
disabled = 0
dispatch.earliest_time = -15m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count min(_time) as firstTime max(_time) as lastTime values(Web.url) as urls values(Web.http_user_agent) as http_user_agent from datamodel=Web where (Web.url_domain IN ("extensions.chat.openai.com","browser.claude.ai") OR Web.url IN ("*chrome.google.com/webstore*chatgpt*","*chrome.google.com/webstore*copilot*","*chrome.google.com/webstore*claude*","*chrome.google.com/webstore*perplexity*","*addons.mozilla.org*chatgpt*","*addons.mozilla.org*copilot*")) by Web.user Web.src \
	| rename Web.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(src,"unknown"), provider="Browser Extension" \
	| stats sum(count) as extension_activity values(urls) as extension_urls values(http_user_agent) as user_agents min(firstTime) as firstTime max(lastTime) as lastTime by user src \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| eval ai_activity="browser_extension", detection_id="hdsi_ai_browser_extension_activity", mitre_attack="T1176", ai_kill_chain_phase="persistence" \
	| `hdsi_ai_browser_extension_activity_filter` \
	| `hdsi_ai_browser_extension_activity_customizations`
