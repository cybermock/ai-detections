[Threat - HDSI AI Generated Phishing Indicators - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI Generated Phishing Indicators
action.correlationsearch.annotations = {"mitre_attack": ["T1566.001"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.rule_title = HDSI AI Generated Phishing Indicators ($user$)
action.notable.param.rule_description = AI-generated phishing indicators: $user$ from $src$ used AI ($ai_providers$, $ai_requests$ requests) then sent $emails_sent$ emails.
action.notable.param.security_domain = threat
action.notable.param.severity = medium
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View related web activity","search":"| tstats summariesonly=t count sum(Web.bytes_out) as bytes_out sum(Web.bytes_in) as bytes_in values(Web.url) as url values(Web.http_user_agent) as http_user_agent values(Web.dest) as dest min(_time) as firstTime max(_time) as lastTime from datamodel=Web where Web.url_domain=* by Web.user Web.src Web.url_domain | rename Web.* as * | search user=\"$user$\" OR src=\"$src$\" | eval mb_out=round(bytes_out/1024/1024,2), mb_in=round(bytes_in/1024/1024,2) | table firstTime, lastTime, user, src, url_domain, count, mb_out, mb_in, dest, http_user_agent, url | sort - count","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.verbose = 0
action.risk = 1
action.risk.param._risk_message = AI-generated phishing indicators: $user$ from $src$ used AI ($ai_providers$, $ai_requests$ requests) then sent $emails_sent$ emails.
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score": 40},{"risk_object_field":"src","risk_object_type":"system","risk_score": 20}]
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.digest_mode = 1
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user,src
alert.suppress.period = 3600s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 1-59/5 * * * *
description = Detect indicators of AI-generated phishing content including high-volume email composition with AI service correlation. MITRE: T1566.001
disabled = 0
dispatch.earliest_time = -15m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count sum(Web.bytes_out) as bytes_out min(_time) as firstTime max(_time) as lastTime from datamodel=Web where Web.url_domain=* by Web.user Web.src Web.url_domain _time span=1h \
	| rename Web.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(src,"unknown"), ai_domain=lower(url_domain) \
	| `ai_domains_filter` \
	| where isnotnull(provider) \
	| eval _source="ai_web" \
	| append [| tstats summariesonly=t allow_old_summaries=t count min(_time) as firstTime max(_time) as lastTime from datamodel=Email where Email.action="send" by Email.src_user _time span=1h \
	| rename Email.src_user as user \
	| eval _source="email"] \
	| stats sum(eval(if(_source="ai_web",count,0))) as ai_requests sum(eval(if(_source="ai_web",bytes_out,0))) as ai_bytes values(eval(if(_source="ai_web",provider,null()))) as ai_providers values(eval(if(_source="ai_web",src,null()))) as src sum(eval(if(_source="email",count,0))) as emails_sent min(firstTime) as firstTime max(lastTime) as lastTime by user \
	| eval src=mvindex(src,0) \
	| where ai_requests>=5 AND emails_sent>=10 \
	| mvexpand ai_providers \
	| rename ai_providers as provider \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| stats max(ai_requests) as ai_requests max(ai_bytes) as ai_bytes values(provider) as ai_providers max(emails_sent) as emails_sent min(firstTime) as firstTime max(lastTime) as lastTime by user src \
	| eval provider=mvjoin(ai_providers,",") \
	| eval ai_activity="ai_phishing_indicators", detection_id="hdsi_ai_generated_phishing_indicators", mitre_attack="T1566.001", ai_kill_chain_phase="staging" \
	| `hdsi_ai_generated_phishing_indicators_filter` \
	| `hdsi_ai_generated_phishing_indicators_customizations`
