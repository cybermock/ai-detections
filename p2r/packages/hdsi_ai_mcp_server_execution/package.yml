version: 1.0.0
package_title: HDSI AI MCP Server Execution
creation_date: '2026-03-04'
author: Hurricane Labs
description: "Detect execution of Model Context Protocol (MCP) servers that allow AI tools to access local resources, files, databases, and APIs. MCP servers expand AI tool capabilities beyond chat and can be used for unauthorized data access. MITRE: T1059"
enable_alerting: false
app_context: HurricaneLabsContentUpdates
common_dependencies:
  - macros:ai_unsanctioned_filter
tags:
  - rba_only
  - process
  - endpoint
app_compatibility:
  - app_name: SplunkEnterpriseSecuritySuite
    operator: ">="
    required_version: "8.0.0"
data_prereqs:
  datamodels:
    op: AND
    items:
    - "Endpoint.Processes"
deployment_type: global
prereq_packages:
  - hdsi_ai_rba_common
