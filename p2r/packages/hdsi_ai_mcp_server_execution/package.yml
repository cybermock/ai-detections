author: Hurricane Labs
app_compatibility:
  - app_name: SplunkEnterpriseSecuritySuite
    operator: '*'
    required_version: '*'
app_context: HurricaneLabsContentUpdates
enable_alerting: false
common_dependencies:
  - macros:ai_unsanctioned_filter
tags:
  - rba_only
  - process
  - endpoint
data_prereqs:
  datamodels:
    op: AND
    items:
    - "Endpoint.Processes"
deployment_type: global
prereq_packages:
  - hdsi_ai_rba_common
