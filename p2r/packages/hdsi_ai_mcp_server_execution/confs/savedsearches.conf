[Endpoint - HDSI AI MCP Server Execution - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI MCP Server Execution
action.correlationsearch.annotations = {"mitre_attack": ["T1059"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.rule_title = HDSI AI MCP Server Execution ($user$)
action.notable.param.rule_description = MCP-style server execution by $user$ on $src$: $mcp_types$ capability type(s) via $launchers$ (evidence_score=$max_evidence_score$). Commands: $mcp_commands$.
action.notable.param.security_domain = endpoint
action.notable.param.severity = medium
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View related process activity","search":"| tstats summariesonly=t count min(_time) as firstTime max(_time) as lastTime values(Processes.process) as process values(Processes.process_name) as process_name values(Processes.parent_process_name) as parent_process_name by Processes.user Processes.dest | rename Processes.* as * | eval src=coalesce(src,dest) | search user=\"$user$\" OR src=\"$src$\" | table firstTime, lastTime, user, src, process_name, process, parent_process_name, count | sort - count","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.verbose = 0
action.risk = 1
action.risk.param._risk_message = MCP-style server execution by $user$ on $src$: $mcp_types$ capability type(s) via $launchers$ (evidence_score=$max_evidence_score$). Commands: $mcp_commands$.
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score": 35},{"risk_object_field":"src","risk_object_type":"system","risk_score": 20}]
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.digest_mode = 1
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user,src
alert.suppress.period = 3600s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 1-59/5 * * * *
description = Detect execution of Model Context Protocol (MCP) servers that allow AI tools to access local resources, files, databases, and APIs. MCP servers expand AI tool capabilities beyond chat and can be used for unauthorized data access. MITRE: T1059
disabled = 0
dispatch.earliest_time = -15m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count min(_time) as firstTime max(_time) as lastTime values(Processes.process) as process values(Processes.parent_process_name) as parent_process_name from datamodel=Endpoint.Processes where Processes.process_name IN ("npx","npx.exe","uvx","uvx.exe","node","node.exe","python","python3","python.exe","python3.exe","deno","deno.exe","bun","bun.exe") by Processes.user Processes.dest Processes.process_name \
	| rename Processes.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(dest,"unknown") \
	| mvexpand process \
	| eval process_lc=lower(coalesce(process,"")), parent_process_name_lc=lower(coalesce(parent_process_name,"")) \
	| eval has_mcp_token=if(match(process_lc,"mcp|modelcontextprotocol|@modelcontextprotocol|mcp-server|mcp_server"),1,0), has_protocol_token=if(match(process_lc,"--stdio|--transport|json-rpc|jsonrpc|tools/list|resources/list|transport"),1,0), has_capability_token=if(match(process_lc,"filesystem|postgres|sqlite|mysql|database|github|gitlab|slack|discord|notion|atlassian|browser|playwright|puppeteer|docker|kubernetes|redis"),1,0) \
	| eval evidence_score=(has_mcp_token*2)+has_protocol_token+has_capability_token \
	| where evidence_score>=2 \
	| eval mcp_type=case(match(process_lc,"filesystem|server-fs"),"filesystem",match(process_lc,"github|gitlab"),"source_control",match(process_lc,"postgres|sqlite|mysql|database"),"database",match(process_lc,"slack|discord|notion|atlassian"),"saas",match(process_lc,"puppeteer|browser|playwright"),"browser",match(process_lc,"search|fetch"),"search",match(process_lc,"docker|kubernetes"),"infrastructure",match(process_lc,"redis|memory"),"memory",true(),"custom") \
	| stats max(count) as executions values(process_name) as launchers values(parent_process_name_lc) as parent_processes values(mcp_type) as mcp_types values(process) as mcp_commands max(evidence_score) as max_evidence_score min(firstTime) as firstTime max(lastTime) as lastTime by user src \
	| eval provider="MCP Server" \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| eval ai_activity="mcp_server_execution", detection_id="hdsi_ai_mcp_server_execution", mitre_attack="T1059", ai_kill_chain_phase="execution" \
	| `hdsi_ai_mcp_server_execution_filter` \
	| `hdsi_ai_mcp_server_execution_customizations`
