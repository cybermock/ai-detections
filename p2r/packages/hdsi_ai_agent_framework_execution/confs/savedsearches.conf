[Endpoint - HDSI AI Agent Framework Execution - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI Agent Framework Execution
action.correlationsearch.annotations = {"mitre_attack": ["T1059"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View related process activity","search":"| tstats summariesonly=t count min(_time) as firstTime max(_time) as lastTime values(Processes.process) as process values(Processes.process_name) as process_name values(Processes.parent_process_name) as parent_process_name by Processes.user Processes.dest | rename Processes.* as * | eval src=coalesce(src,dest) | search user=\"$user$\" OR src=\"$src$\" | table firstTime, lastTime, user, src, process_name, process, parent_process_name, count | sort - count","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.rule_description = AI agent framework execution by $user$ on $src$ using $process_name$ ($provider$).
action.notable.param.rule_title = HDSI AI Agent Framework Execution ($user$)
action.notable.param.security_domain = endpoint
action.notable.param.severity = medium
action.notable.param.verbose = 0
alert.digest_mode = 1
action.risk = 1
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score":40},{"risk_object_field":"src","risk_object_type":"system","risk_score":25}]
action.risk.param._risk_message = AI agent framework execution by $user$ on $src$ using $process_name$ ($provider$).
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user,src,process_name
alert.suppress.period = 3600s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 4-59/5 * * * *
description = Detect execution of AI autonomous agent frameworks including AutoGPT, CrewAI, LangChain serve, AutoGen, MetaGPT, BabyAGI, SuperAGI, AgentGPT, OpenDevin, SWE-agent, and similar orchestration tools. MITRE: T1059
disabled = 0
dispatch.earliest_time = -15m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count min(_time) as firstTime max(_time) as lastTime values(Processes.process) as process values(Processes.parent_process_name) as parent_process_name from datamodel=Endpoint.Processes where Processes.process_name IN ("autogpt","autogpt.exe","crewai","crewai.exe","langchain","langchain.exe","autogen","autogen.exe","metagpt","metagpt.exe","babyagi","babyagi.exe","superagi","superagi.exe","agentgpt","agentgpt.exe","opendevin","opendevin.exe","openhands","openhands.exe","swe-agent","swe-agent.exe","devika","devika.exe","gpt-engineer","gpt-engineer.exe","smol-developer","smol-developer.exe") by Processes.user Processes.dest Processes.process_name Processes.parent_process_name \
	| rename Processes.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(dest,"unknown"), process_name_lc=lower(process_name) \
	| eval provider=case(match(process_name_lc,"autogpt"),"AutoGPT",match(process_name_lc,"crewai"),"CrewAI",match(process_name_lc,"langchain"),"LangChain",match(process_name_lc,"autogen"),"AutoGen",match(process_name_lc,"metagpt"),"MetaGPT",match(process_name_lc,"babyagi"),"BabyAGI",match(process_name_lc,"superagi"),"SuperAGI",match(process_name_lc,"agentgpt"),"AgentGPT",match(process_name_lc,"opendevin|openhands"),"OpenHands",match(process_name_lc,"swe-agent"),"SWE-agent",match(process_name_lc,"devika"),"Devika",match(process_name_lc,"gpt-engineer"),"GPT-Engineer",match(process_name_lc,"smol-developer"),"Smol Developer",true(),"AI Agent") \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| eval ai_activity="agent_framework_execution", detection_id="hdsi_ai_agent_framework_execution", mitre_attack="T1059", ai_kill_chain_phase="execution" \
	| `hdsi_ai_agent_framework_execution_filter` \
	| `hdsi_ai_agent_framework_execution_customizations`
