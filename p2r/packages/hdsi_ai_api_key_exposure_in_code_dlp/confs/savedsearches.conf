[Audit - HDSI AI API Key Exposure In Code/DLP - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI API Key Exposure In Code/DLP
action.correlationsearch.annotations = {"mitre_attack": ["T1552.001"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View related code secret exposure events","search":"search sourcetype IN (\"*github*\",\"*gitlab*\",\"*bitbucket*\",\"*dlp*\",\"*code_review*\",\"*secret_scan*\") user=\"$user$\" host=\"$src$\" | table _time, sourcetype, source, host, user | sort - _time | head 200","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.rule_description = AI API key exposure detected for $user$ on $src$: $exposure_count$ key(s) found in $sources$. Provider: $provider$.
action.notable.param.rule_title = HDSI AI API Key Exposure In Code/DLP ($user$)
action.notable.param.security_domain = audit
action.notable.param.severity = high
action.notable.param.verbose = 0
alert.digest_mode = 1
action.risk = 1
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score":55},{"risk_object_field":"src","risk_object_type":"system","risk_score":25}]
action.risk.param._risk_message = AI API key exposure detected for $user$ on $src$: $exposure_count$ key(s) found in $sources$. Provider: $provider$.
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user,src
alert.suppress.period = 3600s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 1-59/5 * * * *
description = Detect AI provider API keys exposed in code repositories, DLP alerts, or log entries using regex patterns. MITRE: T1552.001
disabled = 0
dispatch.earliest_time = -15m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = sourcetype IN ("*github*","*gitlab*","*bitbucket*","*dlp*","*code_review*","*secret_scan*") \
	| eval scan_text=coalesce(_raw,"") \
	| where match(scan_text,"(?i)(sk-|api[_-]?key|x-api-key|AIzaSy|hf_|gsk_|tog-|fw_|xai-|sk-or-|pplx-|gh[pousr]_)") \
	| eval user=coalesce(user,"unknown"), src=coalesce(host,"unknown") \
	| append [| `ai_api_key_patterns_enabled` \
	| eval _marker=1] \
	| eventstats values(eval(if(_marker=1, regex_pattern."|||".pattern_id."|||".provider."|||".severity, null()))) as _pattern_bundle \
	| where isnull(_marker) \
	| mvexpand _pattern_bundle \
	| rex field=_pattern_bundle "^(?<_pat>.+?)\\|\\|\\|(?<_pid>.+?)\\|\\|\\|(?<_prov>.+?)\\|\\|\\|(?<_sev>.+?)$" \
	| where _pat!="" AND match(scan_text, _pat) \
	| stats count as exposure_count values(sourcetype) as sources values(_sev) as severities values(source) as file_paths values(_pid) as matched_patterns min(_time) as firstTime max(_time) as lastTime by user src _prov \
	| rename _prov as provider \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| eval ai_activity="api_key_exposure", detection_id="hdsi_ai_api_key_exposure_in_code_dlp", mitre_attack="T1552.001", ai_kill_chain_phase="staging" \
	| `hdsi_ai_api_key_exposure_in_code_dlp_filter` \
	| `hdsi_ai_api_key_exposure_in_code_dlp_customizations`
