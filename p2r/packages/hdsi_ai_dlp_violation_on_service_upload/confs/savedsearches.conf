[Audit - HDSI AI DLP Violation On Service Upload - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI DLP Violation On Service Upload
action.correlationsearch.annotations = {"mitre_attack": ["T1567.002"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.rule_title = HDSI AI DLP Violation On Service Upload ($user$)
action.notable.param.rule_description = DLP policy violation: $user$ triggered $violations$ DLP alert(s) uploading to AI service $provider$. Files: $files$. Policies: $policy_types$ (risk_multiplier=$_final_multiplier$).
action.notable.param.security_domain = audit
action.notable.param.severity = medium
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View related DLP activity","search":"| tstats summariesonly=t count values(DLP.file_name) as files values(DLP.dlp_type) as policy_types values(DLP.dest) as dest min(_time) as firstTime max(_time) as lastTime from datamodel=Data_Loss_Prevention where DLP.dest=* by DLP.user DLP.src | rename DLP.* as * | search user=\"$user$\" OR src=\"$src$\" | table firstTime, lastTime, user, src, dest, files, policy_types, count | sort - count","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.verbose = 0
action.risk = 1
action.risk.param._risk_message = DLP policy violation: $user$ triggered $violations$ DLP alert(s) uploading to AI service $provider$. Files: $files$. Policies: $policy_types$ (risk_multiplier=$_final_multiplier$).
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score":"$_mult_user_risk$"},{"risk_object_field":"src","risk_object_type":"system","risk_score": 30}]
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.digest_mode = 1
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user,provider
alert.suppress.period = 3600s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 4-59/5 * * * *
description = Correlate DLP policy violations with AI service destinations. Highest-confidence detection: sensitive data was uploaded to an external AI provider. MITRE: T1567.002
disabled = 0
dispatch.earliest_time = -15m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count min(_time) as firstTime max(_time) as lastTime from datamodel=Data_Loss_Prevention where DLP.dest=* by DLP.user DLP.src DLP.dest DLP.file_name DLP.dlp_type \
	| rename DLP.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(src,"unknown"), dlp_dest_lc=lower(coalesce(dest,"")) \
	| rex field=dlp_dest_lc "(?i)^(?:[a-z][a-z0-9+.-]*://)?(?<ai_domain>[^/?#:]+)" \
	| eval ai_domain=coalesce(ai_domain,dlp_dest_lc), ai_domain=replace(ai_domain,"^\\*\\.",""), ai_domain=replace(ai_domain,":\\d+$","") \
	| `ai_domains_filter` \
	| where isnotnull(provider) \
	| stats sum(count) as violations values(file_name) as files values(dlp_type) as policy_types values(ai_domain) as ai_domains max(severity_weight) as severity_weight min(firstTime) as firstTime max(lastTime) as lastTime by user src provider \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| `ai_risk_multiplier` \
	| eval _mult_user_risk=round(60*_final_multiplier*coalesce(tonumber(severity_weight),1.0)) \
	| eval ai_activity="dlp_ai_upload", detection_id="AI-020", mitre_attack="T1567.002", ai_kill_chain_phase="exfiltration" \
	| `hdsi_ai_dlp_violation_on_service_upload_filter` \
	| `hdsi_ai_dlp_violation_on_service_upload_customizations`
