version: 1.0.0
package_title: HDSI AI DLP Violation On Service Upload
creation_date: '2026-03-04'
author: Hurricane Labs
description: "Correlate DLP policy violations with AI service destinations. Highest-confidence detection: sensitive data was uploaded to an external AI provider. MITRE: T1567.002"
enable_alerting: false
app_context: HurricaneLabsContentUpdates
common_dependencies:
  - macros:ai_domains_filter
  - macros:ai_risk_multiplier
  - macros:ai_unsanctioned_filter
tags:
  - rba_only
  - data_exfiltration
app_compatibility:
  - app_name: SplunkEnterpriseSecuritySuite
    operator: ">="
    required_version: "8.0.0"
data_prereqs:
  datamodels:
    op: AND
    items:
    - "DLP"
deployment_type: global
prereq_packages:
  - hdsi_ai_rba_common
