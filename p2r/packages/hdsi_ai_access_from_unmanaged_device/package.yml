version: 1.0.0
creation_date: '2026-03-04'
package_title: HDSI AI Access From Unmanaged Device
description: "Detect AI service access from endpoints not registered in asset inventory, indicating unmanaged/BYOD device usage. MITRE: T1078.004"
author: Hurricane Labs
app_compatibility:
  - app_name: SplunkEnterpriseSecuritySuite
    operator: '*'
    required_version: '*'
app_context: HurricaneLabsContentUpdates
enable_alerting: false
common_dependencies:
  - macros:ai_domains_filter
  - macros:ai_unsanctioned_filter
tags:
  - rba_only
  - web
  - proxy
data_prereqs:
  datamodels:
    op: AND
    items:
    - "Web"
deployment_type: global
prereq_packages:
  - hdsi_ai_rba_common
