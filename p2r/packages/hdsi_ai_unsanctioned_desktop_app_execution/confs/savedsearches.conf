alert.digest_mode = 1
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user,src,process_name
alert.suppress.period = 3600s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 1-59/5 * * * *
description = Detect unsanctioned use of AI desktop applications including ChatGPT, Claude, Cursor, Windsurf, Pieces, LM Studio, Jan, Continue, Tabnine, Trae, Zed, and Warp. MITRE: T1204.002
disabled = 0
dispatch.earliest_time = -15m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
