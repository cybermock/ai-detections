search = | tstats summariesonly=t allow_old_summaries=t count min(_time) as firstTime max(_time) as lastTime values(Processes.process) as process values(Processes.original_file_name) as original_file_name values(Processes.process_path) as process_path from datamodel=Endpoint.Processes where Processes.process_name IN ("chatgpt","chatgpt.exe","claude","claude.exe","cursor","cursor.exe","windsurf","windsurf.exe","lmstudio","lmstudio.exe","jan","jan.exe","pieces","pieces.exe","continue","continue.exe","tabnine","tabnine.exe","trae","trae.exe","zed","zed.exe","warp","warp.exe") by Processes.user Processes.dest Processes.process_name Processes.original_file_name Processes.process_path \
	| rename Processes.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(dest,"unknown"), process_name_lc=lower(process_name), original_file_name_lc=lower(coalesce(original_file_name,"")), process_path_lc=lower(coalesce(process_path,"")) \
	| lookup ai_tool_processes process_name_lc OUTPUTNEW tool as tool_from_name provider as provider_from_name usage_type as usage_type_from_name enabled as enabled_from_name \
	| lookup ai_tool_processes original_file_name_lc OUTPUTNEW tool as tool_from_ofn provider as provider_from_ofn usage_type as usage_type_from_ofn enabled as enabled_from_ofn \
	| eval tool=coalesce(tool_from_name,tool_from_ofn), provider=coalesce(provider_from_name,provider_from_ofn,case(match(process_path_lc,"chatgpt\\.app"),"OpenAI",match(process_path_lc,"claude\\.app"),"Anthropic",match(process_path_lc,"cursor\\.app"),"Cursor",match(process_path_lc,"windsurf\\.app"),"Codeium",match(process_path_lc,"lm studio\\.app"),"Local LLM",match(process_path_lc,"jan\\.app"),"Local LLM",match(process_path_lc,"pieces\\.app"),"Pieces",match(process_path_lc,"continue\\.app"),"Continue",match(process_path_lc,"tabnine\\.app"),"Tabnine",match(process_path_lc,"trae\\.app"),"ByteDance",match(process_path_lc,"zed\\.app"),"Zed",match(process_path_lc,"warp\\.app"),"Warp")), usage_type=coalesce(usage_type_from_name,usage_type_from_ofn), enabled=coalesce(enabled_from_name,enabled_from_ofn,if(match(process_path_lc,"chatgpt\\.app|claude\\.app|cursor\\.app|windsurf\\.app|lm studio\\.app|jan\\.app|pieces\\.app|continue\\.app|tabnine\\.app|trae\\.app|zed\\.app|warp\\.app"),1,null())) \
	| eval is_desktop_app=if((usage_type="desktop_app") OR match(process_path_lc,"chatgpt\\.app|claude\\.app|cursor\\.app|windsurf\\.app|lm studio\\.app|jan\\.app|pieces\\.app|continue\\.app|tabnine\\.app|trae\\.app|zed\\.app|warp\\.app"),1,0) \
	| where enabled=1 AND is_desktop_app=1 \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| eval ai_activity="desktop_execution", detection_id="AI-005", mitre_attack="T1204.002", ai_kill_chain_phase="execution" \
	| `hdsi_ai_unsanctioned_desktop_app_execution_filter` \
	| `hdsi_ai_unsanctioned_desktop_app_execution_customizations`
