[Audit - HDSI AI Health Data Model Availability - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI Health Data Model Availability
action.correlationsearch.annotations = {"context": ["Source:Endpoint"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.notable = 1
action.notable.param.rule_title = HDSI AI Health Data Model Availability ($data_model$)
action.notable.param.rule_description = Hourly verification that required data models (Web, Endpoint.Processes, Network_Traffic, Network_Resolution, Data_Loss_Prevention, Email, Endpoint.Filesystem) contain recent events. Alerts if any model has zero events in the last 2 hours.
action.notable.param.security_domain = audit
action.notable.param.severity = medium
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View data model status (last 24h)","search":"| tstats count where datamodel=Web earliest=-24h@h latest=now | eval data_model=\"Web\" | append [| tstats count where datamodel=Endpoint.Processes earliest=-24h@h latest=now | eval data_model=\"Endpoint.Processes\"] | append [| tstats count where datamodel=Network_Traffic earliest=-24h@h latest=now | eval data_model=\"Network_Traffic\"] | append [| tstats count where datamodel=Network_Resolution earliest=-24h@h latest=now | eval data_model=\"Network_Resolution\"] | append [| tstats count where datamodel=Data_Loss_Prevention earliest=-24h@h latest=now | eval data_model=\"Data_Loss_Prevention\"] | append [| tstats count where datamodel=Email earliest=-24h@h latest=now | eval data_model=\"Email\"] | append [| tstats count where datamodel=Endpoint.Filesystem earliest=-24h@h latest=now | eval data_model=\"Endpoint.Filesystem\"] | eval status=if(count=0,\"MISSING\",\"OK\") | sort status data_model | table data_model count status","earliest_offset":"-24h@h","latest_offset":"now"},{"name":"View related AI health risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"splunk_platform\" source=\"*HDSI AI Health*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"-24h@h","latest_offset":"now"}]
action.notable.param.verbose = 0
action.risk = 1
action.risk.param._risk_message = AI data model health degradation detected: $data_model$ has zero events in the previous 2 hours.
action.risk.param._risk = [{"risk_object_field":"src","risk_object_type":"system","risk_score": 20}]
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.digest_mode = 1
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = data_model
alert.suppress.period = 14400s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 0 * * * *
description = Hourly verification that required data models (Web, Endpoint.Processes, Network_Traffic, Network_Resolution, Data_Loss_Prevention, Email, Endpoint.Filesystem) contain recent events. Alerts if any model has zero events in the last 2 hours.
disabled = 0
dispatch.earliest_time = -2h@h
dispatch.latest_time = now
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t count from datamodel=Web where earliest=-2h@h latest=now \
	| eval model="Web" \
	| append [| tstats summariesonly=t count from datamodel=Endpoint.Processes where earliest=-2h@h latest=now \
	| eval model="Endpoint.Processes"] \
	| append [| tstats summariesonly=t count from datamodel=Network_Traffic where earliest=-2h@h latest=now \
	| eval model="Network_Traffic"] \
	| append [| tstats summariesonly=t count from datamodel=Network_Resolution where earliest=-2h@h latest=now \
	| eval model="Network_Resolution"] \
	| append [| tstats summariesonly=t count from datamodel=Data_Loss_Prevention where earliest=-2h@h latest=now \
	| eval model="Data_Loss_Prevention"] \
	| append [| tstats summariesonly=t count from datamodel=Email where earliest=-2h@h latest=now \
	| eval model="Email"] \
	| append [| tstats summariesonly=t count from datamodel=Endpoint.Filesystem where earliest=-2h@h latest=now \
	| eval model="Endpoint.Filesystem"] \
	| where count=0 \
	| table model, count \
	| rename model as data_model, count as event_count \
	| eval src="splunk_platform" \
	| eval _ctl="alert_email_to" \
	| lookup ai_detection_config control_name as _ctl OUTPUTNEW value as alert_email_to \
	| eval alert_email_to=coalesce(alert_email_to,"soc-alerts@company.com") \
	| table data_model, event_count, src, alert_email_to \
	| `hdsi_ai_health_data_model_availability_filter` \
	| `hdsi_ai_health_data_model_availability_customizations`
action.email = 1
action.email.to = $result.alert_email_to$
action.email.subject = AI RBA - Data Model Availability Alert
action.email.message.alert = One or more data models required by AI RBA detections have zero events in the last 2 hours. Detections relying on these data models will not produce results until data flow is restored.
