version: 1.0.0
package_title: HDSI AI Personal Email To AI Service Upload Correlation
creation_date: '2026-03-04'
author: Hurricane Labs
description: "Detect file uploads to personal email services followed by AI service uploads within a 1-hour window, indicating data staging through personal email. MITRE: T1048.002"
enable_alerting: false
app_context: HurricaneLabsContentUpdates
common_dependencies:
  - macros:ai_domains_filter
  - macros:ai_unsanctioned_filter
tags:
  - rba_only
  - web
  - proxy
  - email
  - data_exfiltration
app_compatibility:
  - app_name: SplunkEnterpriseSecuritySuite
    operator: ">="
    required_version: "8.0.0"
data_prereqs:
  datamodels:
    op: AND
    items:
    - "Web"
deployment_type: global
prereq_packages:
  - hdsi_ai_rba_common
