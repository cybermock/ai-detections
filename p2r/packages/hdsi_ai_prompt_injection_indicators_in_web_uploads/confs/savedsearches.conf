action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI Prompt Injection Indicators In Web Uploads
action.correlationsearch.annotations = {"mitre_attack": ["T1190"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.rule_title = HDSI AI Prompt Injection Indicators In Web Uploads ($user$)
action.notable.param.rule_description = Prompt injection indicators detected in uploads by $user$ from $src$ to $provider$. Patterns: $patterns_matched$. Files: $files$.
action.notable.param.security_domain = threat
action.notable.param.severity = high
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View related DLP activity","search":"| tstats summariesonly=t count values(DLP.file_name) as files values(DLP.dlp_type) as policy_types values(DLP.dest) as dest min(_time) as firstTime max(_time) as lastTime from datamodel=Data_Loss_Prevention where DLP.dest=* by DLP.user DLP.src | rename DLP.* as * | search user=\"$user$\" OR src=\"$src$\" | table firstTime, lastTime, user, src, dest, files, policy_types, count | sort - count","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.verbose = 0
action.risk = 1
action.risk.param._risk_message = Prompt injection indicators detected in uploads by $user$ from $src$ to $provider$. Patterns: $patterns_matched$. Files: $files$.
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score": 45},{"risk_object_field":"src","risk_object_type":"system","risk_score": 25}]
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.digest_mode = 1
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user,src,provider
alert.suppress.period = 3600s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 0-59/5 * * * *
description = Detect known prompt injection patterns in web upload content destined for AI services using DLP/proxy content inspection. MITRE: T1190
disabled = 0
dispatch.earliest_time = -15m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count min(_time) as firstTime max(_time) as lastTime from datamodel=Data_Loss_Prevention where DLP.dest=* by DLP.user DLP.src DLP.dest DLP.file_name DLP.file_content DLP.dlp_type \
	| rename DLP.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(src,"unknown"), dest_lc=lower(coalesce(dest,"")) \
	| rex field=dest_lc "(?i)^(?:[a-z][a-z0-9+.-]*://)?(?<ai_domain>[^/?#:]+)" \
	| eval ai_domain=coalesce(ai_domain,dest_lc), ai_domain=replace(ai_domain,"^\\*\\.",""), ai_domain=replace(ai_domain,":\\d+$","") \
	| `ai_domains_filter` \
	| where isnotnull(provider) \
	| eval content_lc=lower(coalesce(file_content,"")) \
	| append [| `ai_prompt_injection_patterns_enabled` \
	| eval _marker=1 \
	| rename pattern as lookup_pattern] \
	| eventstats values(eval(if(_marker=1, lookup_pattern."|||".pattern_id."|||".severity, null()))) as _pattern_bundle \
	| where isnull(_marker) \
	| mvexpand _pattern_bundle \
	| rex field=_pattern_bundle "^(?<_pat>.+?)\\|\\|\\|(?<_pid>.+?)\\|\\|\\|(?<_sev>.+?)$" \
	| where _pat!="" AND match(content_lc, _pat) \
	| stats sum(count) as violations values(file_name) as files values(_pid) as patterns_matched values(_sev) as pattern_severity min(firstTime) as firstTime max(lastTime) as lastTime by user src provider \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| eval ai_activity="prompt_injection", detection_id="AI-030", mitre_attack="T1190", ai_kill_chain_phase="staging" \
	| `hdsi_ai_prompt_injection_indicators_in_web_uploads_filter` \
	| `hdsi_ai_prompt_injection_indicators_in_web_uploads_customizations`
