version: 1.0.0
package_title: HDSI AI Prompt Injection Indicators In Web Uploads
creation_date: '2026-03-04'
author: Hurricane Labs
description: "Detect known prompt injection patterns in web upload content destined for AI services using DLP/proxy content inspection. MITRE: T1190"
enable_alerting: false
app_context: HurricaneLabsContentUpdates
common_dependencies:
  - macros:ai_domains_filter
  - macros:ai_prompt_injection_patterns_enabled
  - macros:ai_unsanctioned_filter
tags:
  - rba_only
  - data_exfiltration
app_compatibility:
  - app_name: SplunkEnterpriseSecuritySuite
    operator: ">="
    required_version: "8.0.0"
data_prereqs:
  datamodels:
    op: AND
    items:
    - "DLP"
deployment_type: global
prereq_packages:
  - hdsi_ai_rba_common
