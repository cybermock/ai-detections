action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI RBA AI Multi-Vector Risk
action.correlationsearch.annotations = {"mitre_attack": ["T1078"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View contributing AI detections","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" NOT source=\"*HDSI RBA*\" | table _time, source, risk_score, risk_object, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"Summarize user AI risk composition","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" NOT source=\"*HDSI RBA*\" | stats count as event_count sum(risk_score) as total_risk values(source) as contributing_searches by risk_object risk_object_type | eval contributing_searches=mvjoin(contributing_searches, \"; \") | table risk_object, risk_object_type, event_count, total_risk, contributing_searches","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.rule_description = User $user$ triggered $unique_categories$ distinct AI detection categories in 24 hours: $category_list$.
action.notable.param.rule_title = Multi-Vector AI Risk Activity ($user$)
action.notable.param.security_domain = threat
action.notable.param.severity = high
action.notable.param.verbose = 0
alert.digest_mode = 1
action.risk = 1
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score":55}]
action.risk.param._risk_message = Multi-vector AI risk for $user$: $unique_categories$ distinct categories ($category_list$) in 24h. Total risk: $total_risk$.
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user
alert.suppress.period = 14400s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 6-59/15 * * * *
description = Detect users triggering 3+ distinct AI detection categories within 24 hours, indicating broad and potentially coordinated AI risk behavior.
disabled = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = index=risk earliest=-24h@h latest=now search_name="*HDSI AI*" risk_object_type="user" \
	| eval det_category=case(match(detection_id,"hdsi_ai_unsanctioned_web_access|hdsi_ai_access_via_vpn_proxy_evasion|hdsi_ai_access_from_unmanaged_device|hdsi_ai_usage_from_personal_account_oauth_mismatch"),"shadow_ai",match(detection_id,"hdsi_ai_unsanctioned_cli_execution|hdsi_ai_unsanctioned_desktop_app_execution|hdsi_ai_scripted_cli_invocation|hdsi_ai_local_llm_framework_execution|hdsi_ai_agent_framework_execution|hdsi_ai_agent_autonomous_action_detection|hdsi_ai_mcp_server_execution"),"execution",match(detection_id,"hdsi_ai_high_volume_upload_to_ai_service|hdsi_ai_after_hours_service_usage|hdsi_ai_usage_volume_anomaly|hdsi_ai_multiple_services_in_single_session|hdsi_ai_dlp_violation_on_service_upload|hdsi_ai_personal_email_to_ai_service_upload_correlation|hdsi_ai_gradual_data_exfiltration_via_ai|hdsi_ai_sanctioned_dlp_violation"),"exfiltration",match(detection_id,"hdsi_ai_prompt_injection_indicators_in_web_uploads|hdsi_ai_generated_phishing_indicators|hdsi_ai_api_key_exposure_in_code_dlp|hdsi_ai_deepfake_tool_execution_access|hdsi_ai_assisted_lateral_movement|hdsi_ai_compromised_plugin_extension_installation|hdsi_ai_voice_cloning_api_access"),"adversarial",match(detection_id,"hdsi_ai_user_peer_group_usage_anomaly|hdsi_ai_time_of_day_usage_pattern_anomaly|hdsi_ai_new_provider_adoption_velocity|hdsi_ai_usage_following_data_access_spike"),"behavioral",match(detection_id,"hdsi_ai_api_access_from_non_dev_endpoint|hdsi_ai_first_seen_provider_for_user|hdsi_ai_repeated_unsanctioned_access_burst|hdsi_ai_dns_queries_to_ai_domains|hdsi_ai_code_assistant_network_connection|hdsi_ai_browser_extension_high_volume_data_transmission"),"recon_access",true(),null()) \
	| where isnotnull(det_category) \
	| stats sum(risk_score) as total_risk dc(det_category) as unique_categories values(det_category) as categories values(search_name) as detections min(_time) as firstTime max(_time) as lastTime by risk_object \
	| eval user=risk_object \
	| eval control_name="multi_vector_categories" \
	| lookup ai_detection_config control_name OUTPUTNEW value as cat_threshold \
	| eval cat_threshold=coalesce(tonumber(cat_threshold),3) \
	| where unique_categories>=cat_threshold \
	| eval category_list=mvjoin(categories,",") \
	| `hdsi_rba_ai_multi_vector_risk_filter` \
	| `hdsi_rba_ai_multi_vector_risk_customizations`
