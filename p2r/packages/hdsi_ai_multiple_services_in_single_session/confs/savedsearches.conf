action.notable.param.rule_title = HDSI AI Multiple Services In Single Session ($user$)
action.notable.param.rule_description = User $user$ accessed $unique_providers$ distinct AI providers in one hour from $src$: $provider_list$. Possible prompt/data shopping.
action.notable.param.security_domain = network
action.notable.param.severity = informational
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View related web activity","search":"| tstats summariesonly=t count sum(Web.bytes_out) as bytes_out sum(Web.bytes_in) as bytes_in values(Web.url) as url values(Web.http_user_agent) as http_user_agent values(Web.dest) as dest min(_time) as firstTime max(_time) as lastTime from datamodel=Web where Web.url_domain=* by Web.user Web.src Web.url_domain | rename Web.* as * | search user=\"$user$\" OR src=\"$src$\" | eval mb_out=round(bytes_out/1024/1024,2), mb_in=round(bytes_in/1024/1024,2) | table firstTime, lastTime, user, src, url_domain, count, mb_out, mb_in, dest, http_user_agent, url | sort - count","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.verbose = 0
action.risk = 1
action.risk.param._risk_message = User $user$ accessed $unique_providers$ distinct AI providers in one hour from $src$: $provider_list$. Possible prompt/data shopping.
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score": 15},{"risk_object_field":"src","risk_object_type":"system","risk_score": 8}]
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.digest_mode = 1
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user,src
alert.suppress.period = 3600s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 2-59/5 * * * *
description = Detect users accessing 3+ distinct AI services within a single hour. May indicate prompt shopping or data exfiltration across multiple channels. MITRE: T1567.002
disabled = 0
dispatch.earliest_time = -15m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count min(_time) as firstTime max(_time) as lastTime values(Web.url_domain) as url_domains from datamodel=Web where Web.url_domain=* by Web.user Web.src _time span=1h \
	| rename Web.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(src,"unknown"), _temp_domains=url_domains \
	| mvexpand _temp_domains \
	| eval ai_domain=lower(_temp_domains) \
	| `ai_domains_filter` \
	| stats sum(count) as total_requests values(ai_domain) as ai_domains min(firstTime) as firstTime max(lastTime) as lastTime by user src provider \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| eventstats dc(provider) as unique_providers values(provider) as providers by user src \
	| eval control_name="multi_service_threshold" \
	| lookup ai_detection_config control_name OUTPUTNEW value as svc_threshold \
	| eval svc_threshold=coalesce(tonumber(svc_threshold),3) \
	| where unique_providers>=svc_threshold \
	| eval provider_list=mvjoin(providers,",") \
	| eval ai_activity="multi_service_session", detection_id="hdsi_ai_multiple_services_in_single_session", mitre_attack="T1567.002", ai_kill_chain_phase="exfiltration" \
	| `hdsi_ai_multiple_services_in_single_session_filter` \
	| `hdsi_ai_multiple_services_in_single_session_customizations`
