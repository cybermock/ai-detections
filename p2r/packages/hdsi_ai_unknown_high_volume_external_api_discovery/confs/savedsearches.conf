[Network - HDSI AI Unknown High-Volume External API Discovery - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI Unknown High-Volume External API Discovery
action.correlationsearch.annotations = {"mitre_attack": ["T1046"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.rule_title = HDSI AI Unknown High-Volume External API Discovery ($url_domain$)
action.notable.param.rule_description = Unknown high-volume external API usage detected for user $user$ from system $src$ to $url_domain$ with $count$ requests.
action.notable.param.security_domain = network
action.notable.param.severity = medium
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object IN (\"$risk_object$\", \"$user$\", \"$src$\") source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View unknown external API web activity","search":"| tstats summariesonly=t count sum(Web.bytes_out) as bytes_out sum(Web.bytes_in) as bytes_in values(Web.url) as url values(Web.http_user_agent) as http_user_agent values(Web.dest) as dest min(_time) as firstTime max(_time) as lastTime from datamodel=Web where Web.user=\"$user$\" Web.src=\"$src$\" Web.url_domain=\"$url_domain$\" by Web.user Web.src Web.url_domain | rename Web.* as * | eval mb_out=round(bytes_out/1024/1024,2), mb_in=round(bytes_in/1024/1024,2) | table firstTime, lastTime, user, src, url_domain, count, mb_out, mb_in, dest, http_user_agent, url","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.verbose = 0
action.risk = 1
action.risk.param._risk_message = Unknown high-volume external API usage detected for user $user$ from $src$ to $url_domain$ with $count$ requests ($mb_out$ MB outbound, $mb_in$ MB inbound).
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score": 20},{"risk_object_field":"src","risk_object_type":"system","risk_score": 15}]
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.digest_mode = 1
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = url_domain
alert.suppress.period = 86400s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 0 2 * * *
description = Detects unknown high-volume external API usage patterns that may indicate unsanctioned AI service access.
disabled = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count sum(Web.bytes_out) as bytes_out sum(Web.bytes_in) as bytes_in min(_time) as firstTime max(_time) as lastTime values(Web.dest) as dest values(Web.http_user_agent) as http_user_agent values(Web.url) as urls from datamodel=Web where Web.url_domain=* by Web.user Web.src Web.url_domain \
	| rename Web.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(src,"unknown"), ai_domain=lower(url_domain) \
	| lookup ai_provider_domains domain as ai_domain OUTPUTNEW provider \
	| where isnull(provider) \
	| eval control_name="discovery_api_count" \
	| lookup ai_detection_config control_name OUTPUTNEW value as api_threshold \
	| eval api_threshold=coalesce(tonumber(api_threshold),50) \
	| where count>=api_threshold \
	| eval mb_out=round(bytes_out/1024/1024,2), mb_in=round(bytes_in/1024/1024,2) \
	| sort -count \
	| head 100 \
	| eval provider="unknown_external_api", ai_activity="unknown_api_discovery", detection_id="hdsi_ai_unknown_high_volume_external_api_discovery", ai_kill_chain_phase="recon" \
	| `hdsi_ai_unknown_high_volume_external_api_discovery_filter` \
	| `hdsi_ai_unknown_high_volume_external_api_discovery_customizations`
