version: 1.0.0
creation_date: '2026-03-04'
package_title: HDSI AI Usage From Personal Account / OAuth Mismatch
description: "Detect AI service access where the authenticated user identity does not match corporate identity, suggesting personal account usage. Requires proxy/web data sources that populate the Web.cookie CIM field. MITRE: T1078.004"
author: Hurricane Labs
app_compatibility:
  - app_name: SplunkEnterpriseSecuritySuite
    operator: '*'
    required_version: '*'
app_context: HurricaneLabsContentUpdates
enable_alerting: false
common_dependencies:
  - macros:ai_domains_filter
  - macros:ai_unsanctioned_filter
tags:
  - rba_only
  - web
  - proxy
  - identity
data_prereqs:
  datamodels:
    op: AND
    items:
    - "Web"
  searches:
    op: AND
    items:
    - "| tstats count from datamodel=Web where Web.cookie=* by Web.cookie | head 1 | where count > 0"
deployment_type: global
prereq_packages:
  - hdsi_ai_rba_common
