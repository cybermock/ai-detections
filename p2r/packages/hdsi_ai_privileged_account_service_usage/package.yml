version: 1.0.0
package_title: HDSI AI Privileged Account Service Usage
creation_date: '2026-03-04'
author: Hurricane Labs
description: "Detect AI service usage by privileged accounts (admins, service accounts, critical-priority users). Requires identity_lookup_expanded in Splunk ES. MITRE: T1078.004"
enable_alerting: false
app_context: HurricaneLabsContentUpdates
common_dependencies:
  - macros:ai_domains_filter
  - macros:ai_risk_multiplier
  - macros:ai_unsanctioned_filter
tags:
  - rba_only
  - web
  - proxy
  - identity
app_compatibility:
  - app_name: SplunkEnterpriseSecuritySuite
    operator: ">="
    required_version: "8.0.0"
data_prereqs:
  datamodels:
    op: AND
    items:
    - "Web"
deployment_type: global
prereq_packages:
  - hdsi_ai_rba_common
