search = | tstats summariesonly=t allow_old_summaries=t count min(_time) as firstTime max(_time) as lastTime values(Web.url) as urls from datamodel=Web where Web.url_domain=* by Web.user Web.src Web.url_domain Web.http_user_agent \
	| rename Web.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(src,"unknown"), ai_domain=lower(url_domain) \
	| `ai_domains_filter` \
	| lookup asset_lookup_by_str ip as src OUTPUTNEW category as src_category is_expected as src_expected \
	| where match(lower(coalesce(src_category,"")),"vpn|proxy|tor|anonymizer") OR match(lower(coalesce(http_user_agent,"")),"tunnel|proxy|vpn|tor") \
	| stats sum(count) as request_count values(ai_domain) as ai_domains values(src_category) as evasion_methods min(firstTime) as firstTime max(lastTime) as lastTime by user src provider \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| eval ai_activity="vpn_proxy_evasion", detection_id="hdsi_ai_access_via_vpn_proxy_evasion", mitre_attack="T1090.003", ai_kill_chain_phase="collection" \
	| `hdsi_ai_access_via_vpn_proxy_evasion_filter` \
	| `hdsi_ai_access_via_vpn_proxy_evasion_customizations`
