alert.digest_mode = 1
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user,src,provider
alert.suppress.period = 86400s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 0 6 * * *
description = Detect gradual cumulative data exfiltration to AI services over a 7-day rolling window. Catches slow-drip exfiltration that evades per-session thresholds. MITRE: T1567.002
disabled = 0
dispatch.earliest_time = -8d@d
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t sum(Web.bytes_out) as bytes_out count from datamodel=Web where Web.url_domain=* by Web.user Web.src Web.url_domain _time span=1d \
	| rename Web.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(src,"unknown"), ai_domain=lower(url_domain) \
	| `ai_domains_filter` \
	| stats sum(bytes_out) as daily_bytes sum(count) as daily_requests by _time user src provider \
	| eval control_name="low_slow_days" \
	| lookup ai_detection_config control_name OUTPUTNEW value as lookback_days \
	| eval control_name="low_slow_cumulative_mb" \
	| lookup ai_detection_config control_name OUTPUTNEW value as cumulative_threshold_mb \
	| eval lookback_days=coalesce(tonumber(lookback_days),7), cumulative_threshold_mb=coalesce(tonumber(cumulative_threshold_mb),50) \
	| where _time>=relative_time(now(),"-"+tostring(lookback_days)+"d@d") \
	| eventstats sum(daily_bytes) as window_bytes sum(daily_requests) as window_requests by user src provider \
	| eval window_mb=round(window_bytes/1024/1024,2) \
	| where window_mb>=cumulative_threshold_mb \
	| where _time>=relative_time(now(),"-1d@d") \
	| eval daily_mb=round(daily_bytes/1024/1024,2) \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| eval ai_activity="low_slow_exfiltration", detection_id="hdsi_ai_gradual_data_exfiltration_via_ai", mitre_attack="T1567.002", ai_kill_chain_phase="exfiltration" \
	| `hdsi_ai_gradual_data_exfiltration_via_ai_filter` \
	| `hdsi_ai_gradual_data_exfiltration_via_ai_customizations`
