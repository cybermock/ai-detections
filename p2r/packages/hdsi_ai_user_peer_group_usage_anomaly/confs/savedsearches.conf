[Identity - HDSI AI User Peer Group Usage Anomaly - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI User Peer Group Usage Anomaly
action.correlationsearch.annotations = {"mitre_attack": ["T1567.002"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View related web activity","search":"| tstats summariesonly=t count sum(Web.bytes_out) as bytes_out sum(Web.bytes_in) as bytes_in values(Web.url) as url values(Web.http_user_agent) as http_user_agent values(Web.dest) as dest min(_time) as firstTime max(_time) as lastTime from datamodel=Web where Web.url_domain=* by Web.user Web.src Web.url_domain | rename Web.* as * | search user=\"$user$\" OR src=\"$src$\" | eval mb_out=round(bytes_out/1024/1024,2), mb_in=round(bytes_in/1024/1024,2) | table firstTime, lastTime, user, src, url_domain, count, mb_out, mb_in, dest, http_user_agent, url | sort - count","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.rule_description = Peer group AI usage anomaly for $user$ (dept=$department$): $daily_requests$ requests (z=$z_requests$, dept_avg=$dept_avg_requests$) and $mb_out$ MB (z=$z_bytes$).
action.notable.param.rule_title = HDSI AI User Peer Group Usage Anomaly ($user$)
action.notable.param.security_domain = access
action.notable.param.severity = medium
action.notable.param.verbose = 0
alert.digest_mode = 1
action.risk = 1
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score":30}]
action.risk.param._risk_message = Peer group AI usage anomaly for $user$ (dept=$department$): $daily_requests$ requests (z=$z_requests$, dept_avg=$dept_avg_requests$) and $mb_out$ MB (z=$z_bytes$).
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user
alert.suppress.period = 86400s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 30 4 * * *
description = Detect users whose AI usage significantly deviates from their department peer group using eventstats z-score analysis. MITRE: T1567.002
disabled = 0
dispatch.earliest_time = -7d@d
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count sum(Web.bytes_out) as bytes_out from datamodel=Web where Web.url_domain=* by Web.user Web.url_domain _time span=1d \
	| rename Web.* as * \
	| eval ai_domain=lower(url_domain) \
	| `ai_domains_filter` \
	| stats sum(count) as daily_requests sum(bytes_out) as daily_bytes by _time user provider \
	| lookup identity_lookup_expanded identity as user OUTPUTNEW bunit \
	| eval department=lower(coalesce(bunit,"general")) \
	| stats sum(daily_requests) as daily_requests sum(daily_bytes) as daily_bytes values(provider) as providers by _time user department \
	| eventstats avg(daily_requests) as dept_avg_requests stdev(daily_requests) as dept_stdev_requests avg(daily_bytes) as dept_avg_bytes stdev(daily_bytes) as dept_stdev_bytes count as dept_size by department _time \
	| eval control_name="peer_group_zscore" \
	| lookup ai_detection_config control_name OUTPUTNEW value as peer_zscore \
	| eval peer_zscore=coalesce(tonumber(peer_zscore),2.5) \
	| eval z_requests=if(dept_stdev_requests>0,round((daily_requests-dept_avg_requests)/dept_stdev_requests,2),0), z_bytes=if(dept_stdev_bytes>0,round((daily_bytes-dept_avg_bytes)/dept_stdev_bytes,2),0) \
	| where dept_size>=5 \
	| where z_requests>peer_zscore OR z_bytes>peer_zscore \
	| where _time>=relative_time(now(),"-1d@d") \
	| eval mb_out=round(daily_bytes/1024/1024,2), src="unknown" \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| eval ai_activity="peer_group_anomaly", detection_id="hdsi_ai_user_peer_group_usage_anomaly", mitre_attack="T1567.002", ai_kill_chain_phase="exfiltration" \
	| `hdsi_ai_user_peer_group_usage_anomaly_filter` \
	| `hdsi_ai_user_peer_group_usage_anomaly_customizations`
