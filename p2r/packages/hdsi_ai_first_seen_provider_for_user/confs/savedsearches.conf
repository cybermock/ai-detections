[Network - HDSI AI First Seen Provider For User - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI First Seen Provider For User
action.correlationsearch.annotations = {"mitre_attack": ["T1071.001"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.rule_title = HDSI AI First Seen Provider For User ($user$)
action.notable.param.rule_description = First-seen unsanctioned AI provider usage by $user$ on $provider$ from $src$ (severity_weight=$severity_weight$).
action.notable.param.security_domain = network
action.notable.param.severity = medium
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View related web activity","search":"| tstats summariesonly=t count sum(Web.bytes_out) as bytes_out sum(Web.bytes_in) as bytes_in values(Web.url) as url values(Web.http_user_agent) as http_user_agent values(Web.dest) as dest min(_time) as firstTime max(_time) as lastTime from datamodel=Web where Web.url_domain=* by Web.user Web.src Web.url_domain | rename Web.* as * | search user=\"$user$\" OR src=\"$src$\" | eval mb_out=round(bytes_out/1024/1024,2), mb_in=round(bytes_in/1024/1024,2) | table firstTime, lastTime, user, src, url_domain, count, mb_out, mb_in, dest, http_user_agent, url | sort - count","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.verbose = 0
action.risk = 1
action.risk.param._risk_message = First-seen unsanctioned AI provider usage by $user$ on $provider$ from $src$ (severity_weight=$severity_weight$).
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score":"$_weighted_risk$"},{"risk_object_field":"src","risk_object_type":"system","risk_score":"$_weighted_sys_risk$"}]
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.digest_mode = 1
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user,provider
alert.suppress.period = 86400s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 0-59/15 * * * *
description = Detect first-seen AI provider usage by a user over a 30-day lookback. MITRE: T1071.001
disabled = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count min(_time) as firstTime max(_time) as lastTime from datamodel=Web where Web.url_domain=* by Web.user Web.src Web.url_domain \
	| rename Web.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(src,"unknown"), ai_domain=lower(url_domain) \
	| `ai_domains_filter` \
	| stats min(firstTime) as first_seen max(lastTime) as last_seen sum(count) as total_requests values(ai_domain) as ai_domains max(severity_weight) as severity_weight by user src provider \
	| where first_seen>=relative_time(now(),"-15m") AND last_seen>=relative_time(now(),"-15m") \
	| eval severity_weight=coalesce(tonumber(severity_weight),1.0), _weighted_risk=round(15*severity_weight), _weighted_sys_risk=round(8*severity_weight) \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| eval ai_activity="first_seen_provider", detection_id="hdsi_ai_first_seen_provider_for_user", mitre_attack="T1071.001", ai_kill_chain_phase="recon" \
	| `hdsi_ai_first_seen_provider_for_user_filter` \
	| `hdsi_ai_first_seen_provider_for_user_customizations`
