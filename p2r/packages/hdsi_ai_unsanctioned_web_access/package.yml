version: 1.0.0
creation_date: '2026-03-04'
package_title: HDSI AI Unsanctioned Web Access
description: "Consolidated detection for unsanctioned web access to any AI provider. Dynamically uses ai_provider_domains.csv lookup. Replaces deprecated legacy unsanctioned AI web access detections. MITRE: T1071.001"
author: Hurricane Labs
app_compatibility:
  - app_name: SplunkEnterpriseSecuritySuite
    operator: '*'
    required_version: '*'
app_context: HurricaneLabsContentUpdates
enable_alerting: false
common_dependencies:
  - macros:ai_domains_filter
  - macros:ai_risk_multiplier
  - macros:ai_unsanctioned_filter
tags:
  - rba_only
  - web
  - proxy
data_prereqs:
  datamodels:
    op: AND
    items:
    - "Web"
deployment_type: global
prereq_packages:
  - hdsi_ai_rba_common
