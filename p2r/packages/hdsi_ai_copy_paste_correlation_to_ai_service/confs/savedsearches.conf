[Endpoint - HDSI AI Copy-Paste Correlation To AI Service - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI Copy-Paste Correlation To AI Service
action.correlationsearch.annotations = {"mitre_attack": ["T1115"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.rule_title = HDSI AI Copy-Paste Correlation To AI Service ($user$)
action.notable.param.rule_description = Copy-paste to AI service correlation: $user$ from $src$ clipboard activity followed by upload to $provider$ ($mb_out$ MB).
action.notable.param.security_domain = endpoint
action.notable.param.severity = low
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View related web activity","search":"| tstats summariesonly=t count sum(Web.bytes_out) as bytes_out sum(Web.bytes_in) as bytes_in values(Web.url) as url values(Web.http_user_agent) as http_user_agent values(Web.dest) as dest min(_time) as firstTime max(_time) as lastTime from datamodel=Web where Web.url_domain=* by Web.user Web.src Web.url_domain | rename Web.* as * | search user=\"$user$\" OR src=\"$src$\" | eval mb_out=round(bytes_out/1024/1024,2), mb_in=round(bytes_in/1024/1024,2) | table firstTime, lastTime, user, src, url_domain, count, mb_out, mb_in, dest, http_user_agent, url | sort - count","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.verbose = 0
action.risk = 1
action.risk.param._risk_message = Copy-paste to AI service correlation: $user$ from $src$ clipboard activity followed by upload to $provider$ ($mb_out$ MB).
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score": 25},{"risk_object_field":"src","risk_object_type":"system","risk_score": 12}]
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.digest_mode = 1
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user,src,provider
alert.suppress.period = 3600s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 2-59/5 * * * *
description = Detect clipboard copy events followed by uploads to AI services within a short time window, indicating data staging via copy-paste. MITRE: T1115
disabled = 0
dispatch.earliest_time = -15m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count min(_time) as firstTime max(_time) as lastTime values(DLP.dlp_type) as dlp_types from datamodel=Data_Loss_Prevention where DLP.dlp_type=* by DLP.user DLP.src _time span=5m \
	| rename DLP.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(src,"unknown"), dlp_type_lc=lower(mvjoin(dlp_types,",")) \
	| where match(dlp_type_lc,"clipboard|copy|paste|cut") \
	| eval _source="clipboard" \
	| append [| tstats summariesonly=t allow_old_summaries=t count sum(Web.bytes_out) as bytes_out min(_time) as firstTime max(_time) as lastTime from datamodel=Web where Web.url_domain=* by Web.user Web.src Web.url_domain _time span=5m \
	| rename Web.* as * \
	| eval ai_domain=lower(url_domain) \
	| `ai_domains_filter` \
	| where isnotnull(provider) \
	| eval _source="ai_web"] \
	| stats sum(eval(if(_source="clipboard",count,0))) as clipboard_count sum(eval(if(_source="ai_web",count,0))) as ai_count sum(eval(if(_source="ai_web",bytes_out,0))) as total_bytes values(eval(if(_source="ai_web",ai_domain,null()))) as ai_domains values(eval(if(_source="ai_web",provider,null()))) as providers min(firstTime) as firstTime max(lastTime) as lastTime by user src \
	| where clipboard_count>0 AND ai_count>0 \
	| eval correlation_count=clipboard_count+ai_count, mb_out=round(total_bytes/1024/1024,2) \
	| where correlation_count>=2 \
	| mvexpand providers \
	| rename providers as provider \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| stats max(clipboard_count) as clipboard_count max(ai_count) as ai_count max(correlation_count) as correlation_count max(mb_out) as mb_out values(ai_domains) as ai_domains min(firstTime) as firstTime max(lastTime) as lastTime by user src provider \
	| eval ai_activity="copy_paste_correlation", detection_id="AI-025", mitre_attack="T1115", ai_kill_chain_phase="collection" \
	| `hdsi_ai_copy_paste_correlation_to_ai_service_filter` \
	| `hdsi_ai_copy_paste_correlation_to_ai_service_customizations`
