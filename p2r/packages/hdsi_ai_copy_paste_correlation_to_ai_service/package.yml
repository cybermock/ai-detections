version: 1.0.0
package_title: HDSI AI Copy-Paste Correlation To AI Service
creation_date: '2026-03-04'
author: Hurricane Labs
description: "Detect clipboard copy events followed by uploads to AI services within a short time window, indicating data staging via copy-paste. MITRE: T1115"
enable_alerting: false
app_context: HurricaneLabsContentUpdates
common_dependencies:
  - macros:ai_domains_filter
  - macros:ai_unsanctioned_filter
tags:
  - rba_only
  - endpoint
app_compatibility:
  - app_name: SplunkEnterpriseSecuritySuite
    operator: ">="
    required_version: "8.0.0"
data_prereqs:
  datamodels:
    op: AND
    items:
    - "DLP"
    - "Web"
deployment_type: global
prereq_packages:
  - hdsi_ai_rba_common
