[Network - HDSI AI After Hours Service Usage - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI After Hours Service Usage
action.correlationsearch.annotations = {"mitre_attack": ["T1567.002"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View related web activity","search":"| tstats summariesonly=t count sum(Web.bytes_out) as bytes_out sum(Web.bytes_in) as bytes_in values(Web.url) as url values(Web.http_user_agent) as http_user_agent values(Web.dest) as dest min(_time) as firstTime max(_time) as lastTime from datamodel=Web where Web.url_domain=* by Web.user Web.src Web.url_domain | rename Web.* as * | search user=\"$user$\" OR src=\"$src$\" | eval mb_out=round(bytes_out/1024/1024,2), mb_in=round(bytes_in/1024/1024,2) | table firstTime, lastTime, user, src, url_domain, count, mb_out, mb_in, dest, http_user_agent, url | sort - count","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.rule_description = After-hours AI usage by $user$ from $src$ to $provider$ ($request_count$ requests, $mb_out$ MB uploaded, severity_weight=$severity_weight$).
action.notable.param.rule_title = HDSI AI After Hours Service Usage ($user$)
action.notable.param.security_domain = network
action.notable.param.severity = medium
action.notable.param.verbose = 0
alert.digest_mode = 1
action.risk = 1
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score":"$_weighted_risk$"},{"risk_object_field":"src","risk_object_type":"system","risk_score":"$_weighted_sys_risk$"}]
action.risk.param._risk_message = After-hours AI usage by $user$ from $src$ to $provider$ ($request_count$ requests, $mb_out$ MB uploaded, severity_weight=$severity_weight$).
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user,provider
alert.suppress.period = 3600s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 2-59/5 * * * *
description = Detect AI service usage outside business hours (configurable, default before 6AM or after 8PM, or on weekends). After-hours usage may indicate data exfiltration or reduced oversight. MITRE: T1567.002
disabled = 0
dispatch.earliest_time = -15m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count sum(Web.bytes_out) as bytes_out min(_time) as firstTime max(_time) as lastTime from datamodel=Web where Web.url_domain=* by Web.user Web.src Web.url_domain _time span=1h \
	| rename Web.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(src,"unknown"), ai_domain=lower(url_domain) \
	| `ai_domains_filter` \
	| eval hour=tonumber(strftime(_time,"%H")), dow=tonumber(strftime(_time,"%u")) \
	| eval control_name="after_hours_start" \
	| lookup ai_detection_config control_name OUTPUTNEW value as ah_start \
	| eval control_name="after_hours_end" \
	| lookup ai_detection_config control_name OUTPUTNEW value as ah_end \
	| eval ah_start=coalesce(tonumber(ah_start),20), ah_end=coalesce(tonumber(ah_end),6) \
	| where (hour>=ah_start OR hour<ah_end) OR dow>5 \
	| stats sum(count) as request_count sum(bytes_out) as total_bytes_out values(ai_domain) as ai_domains max(severity_weight) as severity_weight min(firstTime) as firstTime max(lastTime) as lastTime by user src provider \
	| eval mb_out=round(total_bytes_out/1024/1024,2), severity_weight=coalesce(tonumber(severity_weight),1.0), _weighted_risk=round(15*severity_weight), _weighted_sys_risk=round(8*severity_weight) \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| eval ai_activity="after_hours_usage", detection_id="hdsi_ai_after_hours_service_usage", mitre_attack="T1567.002", ai_kill_chain_phase="exfiltration" \
	| `hdsi_ai_after_hours_service_usage_filter` \
	| `hdsi_ai_after_hours_service_usage_customizations`
