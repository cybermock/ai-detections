version: 1.0.0
package_title: HDSI AI High Volume Upload To AI Service
creation_date: '2026-03-04'
author: Hurricane Labs
description: "Detect high data upload volume to AI providers with tiered risk scoring: 1MB (low), 5MB (medium), 10MB (high), 50MB (critical). MITRE: T1567.002"
enable_alerting: false
app_context: HurricaneLabsContentUpdates
common_dependencies:
  - macros:ai_domains_filter
  - macros:ai_risk_multiplier
  - macros:ai_unsanctioned_filter
tags:
  - rba_only
  - web
  - proxy
  - data_exfiltration
app_compatibility:
  - app_name: SplunkEnterpriseSecuritySuite
    operator: ">="
    required_version: "8.0.0"
data_prereqs:
  datamodels:
    op: AND
    items:
    - "Web"
deployment_type: global
prereq_packages:
  - hdsi_ai_rba_common
