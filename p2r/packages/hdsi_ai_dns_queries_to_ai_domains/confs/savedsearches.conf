[Network - HDSI AI DNS Queries To AI Domains - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI DNS Queries To AI Domains
action.correlationsearch.annotations = {"mitre_attack": ["T1071.004"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.rule_title = HDSI AI DNS Queries To AI Domains ($src$)
action.notable.param.rule_description = $dns_query_count$ DNS queries from $src$ to AI domains ($ai_domains$, $provider$).
action.notable.param.security_domain = network
action.notable.param.severity = informational
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View related DNS activity","search":"| tstats summariesonly=t count min(_time) as firstTime max(_time) as lastTime values(DNS.answer) as answer from datamodel=Network_Resolution where DNS.query=* by DNS.src DNS.query | rename DNS.* as * | search src=\"$src$\" | table firstTime, lastTime, src, query, answer, count | sort - count","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.verbose = 0
action.risk = 1
action.risk.param._risk_message = $dns_query_count$ DNS queries from $src$ to AI domains ($ai_domains$, $provider$).
action.risk.param._risk = [{"risk_object_field":"src","risk_object_type":"system","risk_score": 12}]
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.digest_mode = 1
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = src,provider
alert.suppress.period = 3600s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 0-59/5 * * * *
description = Detect DNS resolution of AI service domains. Broad coverage of all known AI provider, API, IDE, and model registry domains. MITRE: T1071.004
disabled = 0
dispatch.earliest_time = -15m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count min(_time) as firstTime max(_time) as lastTime values(DNS.record_type) as record_types from datamodel=Network_Resolution where DNS.query=* by DNS.src DNS.query \
	| rename DNS.* as * \
	| eval src=coalesce(src,"unknown"), ai_domain=lower(query) \
	| `ai_domains_filter` \
	| stats sum(count) as dns_query_count values(ai_domain) as ai_domains values(record_types) as record_types min(firstTime) as firstTime max(lastTime) as lastTime by src provider \
	| eval control_name="dns_query_threshold" \
	| lookup ai_detection_config control_name OUTPUTNEW value as dns_threshold \
	| eval dns_threshold=coalesce(tonumber(dns_threshold),20) \
	| where dns_query_count>=dns_threshold \
	| eval user="unknown" \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| eval ai_activity="ai_dns_query", detection_id="AI-012", mitre_attack="T1071.004", ai_kill_chain_phase="recon" \
	| `hdsi_ai_dns_queries_to_ai_domains_filter` \
	| `hdsi_ai_dns_queries_to_ai_domains_customizations`
