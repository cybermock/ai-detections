version: 1.0.0
package_title: HDSI AI DNS Queries To AI Domains
creation_date: '2026-03-04'
author: Hurricane Labs
description: "Detect DNS resolution of AI service domains. Broad coverage of all known AI provider, API, IDE, and model registry domains. MITRE: T1071.004"
enable_alerting: false
app_context: HurricaneLabsContentUpdates
common_dependencies:
  - macros:ai_domains_filter
  - macros:ai_unsanctioned_filter
tags:
  - rba_only
  - dns
  - network
app_compatibility:
  - app_name: SplunkEnterpriseSecuritySuite
    operator: ">="
    required_version: "8.0.0"
data_prereqs:
  datamodels:
    op: AND
    items:
    - "Network_Resolution"
deployment_type: global
prereq_packages:
  - hdsi_ai_rba_common
