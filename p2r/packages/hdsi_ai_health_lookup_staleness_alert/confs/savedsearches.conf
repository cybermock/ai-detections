[Audit - HDSI AI Health Lookup Staleness Alert - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI Health Lookup Staleness Alert
action.correlationsearch.annotations = {"context": ["Source:Endpoint"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 1
action.notable = 1
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View stale AI lookup inventory","search":"| rest /services/data/lookup-table-files splunk_server=local | where match(title, \"^ai_\") | eval updated_epoch=strptime(updated, \"%Y-%m-%dT%H:%M:%S\") | eval age_days=round((now() - updated_epoch) / 86400, 0) | where age_days > 90 | eval severity=case(age_days>180, \"Critical\", age_days>120, \"High\", true(), \"Warning\") | table title age_days severity updated eai:acl.app | rename title as lookup_file age_days as days_since_update updated as last_updated eai:acl.app as app | sort - days_since_update","earliest_offset":"-30d@d","latest_offset":"now"},{"name":"View related AI health risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"splunk_platform\" source=\"*HDSI AI Health*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"-30d@d","latest_offset":"now"}]
action.notable.param.rule_description = Weekly check for AI RBA lookup files that have not been updated in 90+ days. Sends email alert for stale lookups requiring maintenance.
action.notable.param.rule_title = HDSI AI Health Lookup Staleness Alert ($lookup_file$)
action.notable.param.security_domain = audit
action.notable.param.severity = medium
action.notable.param.verbose = 0
alert.digest_mode = 1
action.risk = 1
action.risk.param._risk = [{"risk_object_field":"src","risk_object_type":"system","risk_score":15}]
action.risk.param._risk_message = AI lookup health degradation detected: $lookup_file$ has not been updated for $days_since_update$ days.
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = lookup_file
alert.suppress.period = 604800s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 0 9 * * 1
description = Weekly check for AI RBA lookup files that have not been updated in 90+ days. Sends email alert for stale lookups requiring maintenance.
disabled = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | rest /services/data/lookup-table-files splunk_server=local \
	| where match(title, "^ai_") \
	| eval updated_epoch=strptime(updated, "%Y-%m-%dT%H:%M:%S") \
	| eval age_days=round((now() - updated_epoch) / 86400, 0) \
	| where age_days > 90 \
	| eval severity=case(age_days>180, "Critical", age_days>120, "High", true(), "Warning") \
	| table title, age_days, severity, updated \
	| rename title as lookup_file, age_days as days_since_update, updated as last_updated \
	| eval src="splunk_platform" \
	| eval _ctl="alert_email_to" \
	| lookup ai_detection_config control_name as _ctl OUTPUTNEW value as alert_email_to \
	| eval alert_email_to=coalesce(alert_email_to,"soc-alerts@company.com") \
	| table lookup_file, days_since_update, severity, last_updated, src, alert_email_to \
	| sort - days_since_update \
	| `hdsi_ai_health_lookup_staleness_alert_filter` \
	| `hdsi_ai_health_lookup_staleness_alert_customizations`
action.email.to = $result.alert_email_to$
action.email.subject = AI RBA - Stale Lookup Files Detected
action.email.message.alert = One or more AI RBA lookup files have not been updated in over 90 days and may contain outdated data. Review and update the listed lookup files.
