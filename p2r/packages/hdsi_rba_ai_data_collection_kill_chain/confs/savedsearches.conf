[Threat - HDSI RBA AI Data Collection Kill Chain - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI RBA AI Data Collection Kill Chain
action.correlationsearch.annotations = {"mitre_attack": ["T1078"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.rule_title = AI Kill Chain - Data Collection to AI Upload ($user$)
action.notable.param.rule_description = User $user$ triggered collection-to-exfiltration kill chain with $kill_chain_phases$ phases.
action.notable.param.security_domain = threat
action.notable.param.severity = high
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View contributing AI detections","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" NOT source=\"*HDSI RBA*\" | table _time, source, risk_score, risk_object, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"Summarize user AI risk composition","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" NOT source=\"*HDSI RBA*\" | stats count as event_count sum(risk_score) as total_risk values(source) as contributing_searches by risk_object risk_object_type | eval contributing_searches=mvjoin(contributing_searches, \"; \") | table risk_object, risk_object_type, event_count, total_risk, contributing_searches","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.verbose = 0
action.risk = 1
action.risk.param._risk_message = Kill chain detected for $user$: $collection_signals$ collection signal(s) + $exfil_signals$ exfiltration signal(s). Detections: $detections$.
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score": 60}]
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.digest_mode = 1
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user
alert.suppress.period = 14400s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 3-59/15 * * * *
description = Multi-phase kill chain detection: data collection (file access, clipboard, DLP) followed by AI service upload within configurable window.
disabled = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = index=risk earliest=-24h@h latest=now search_name="*HDSI AI*" risk_object_type="user" \
	| eval control_name="kill_chain_window_hours" \
	| lookup ai_detection_config control_name OUTPUTNEW value as kill_chain_window_hours \
	| eval kill_chain_window_hours=coalesce(tonumber(kill_chain_window_hours),4), _window_start=relative_time(now(),"-"+tostring(kill_chain_window_hours)+"h") \
	| where _time>=_window_start \
	| eval collection_phase=if(match(detection_id,"hdsi_ai_copy_paste_correlation_to_ai_service|hdsi_ai_usage_following_data_access_spike"),1,0), exfil_phase=if(match(detection_id,"hdsi_ai_high_volume_upload_to_ai_service|hdsi_ai_dlp_violation_on_service_upload|hdsi_ai_gradual_data_exfiltration_via_ai"),1,0) \
	| stats sum(risk_score) as total_risk sum(collection_phase) as collection_signals sum(exfil_phase) as exfil_signals values(search_name) as detections values(detection_id) as detection_ids min(_time) as firstTime max(_time) as lastTime by risk_object \
	| eval user=risk_object \
	| where collection_signals>=1 AND exfil_signals>=1 \
	| eval kill_chain_phases=collection_signals+exfil_signals \
	| `hdsi_rba_ai_data_collection_kill_chain_filter` \
	| `hdsi_rba_ai_data_collection_kill_chain_customizations`
