version: 1.0.0
package_title: HDSI AI Voice Cloning API Access
creation_date: '2026-03-04'
author: Hurricane Labs
description: "Detect web and API access to known voice cloning and speech synthesis services. Voice cloning can be used for social engineering, fraud, and deepfake audio attacks. MITRE: T1588.005"
enable_alerting: false
app_context: HurricaneLabsContentUpdates
common_dependencies:
  - macros:ai_domains_filter
  - macros:ai_unsanctioned_filter
tags:
  - rba_only
  - web
  - proxy
app_compatibility:
  - app_name: SplunkEnterpriseSecuritySuite
    operator: ">="
    required_version: "8.0.0"
data_prereqs:
  datamodels:
    op: AND
    items:
    - "Web"
deployment_type: global
prereq_packages:
  - hdsi_ai_rba_common
