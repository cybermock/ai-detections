version: 1.0.0
creation_date: '2026-03-04'
package_title: HDSI AI Unsanctioned CLI Execution
description: "Detect unsanctioned use of AI CLI tools including codex, claude, gemini, aider, sgpt, llm, tgpt, mods, fabric, aichat, amazon-q, openai, cline, and gh-copilot. MITRE: T1059"
author: Hurricane Labs
app_compatibility:
  - app_name: SplunkEnterpriseSecuritySuite
    operator: '*'
    required_version: '*'
app_context: HurricaneLabsContentUpdates
enable_alerting: false
common_dependencies:
  - macros:ai_process_filter
  - macros:ai_unsanctioned_filter
tags:
  - rba_only
  - process
  - endpoint
data_prereqs:
  datamodels:
    op: AND
    items:
    - "Endpoint.Processes"
deployment_type: global
prereq_packages:
  - hdsi_ai_rba_common
