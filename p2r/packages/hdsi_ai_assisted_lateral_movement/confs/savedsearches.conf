[Threat - HDSI AI Assisted Lateral Movement - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI Assisted Lateral Movement
action.correlationsearch.annotations = {"mitre_attack": ["T1021"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View related process activity","search":"| tstats summariesonly=t count min(_time) as firstTime max(_time) as lastTime values(Processes.process) as process values(Processes.process_name) as process_name values(Processes.parent_process_name) as parent_process_name by Processes.user Processes.dest | rename Processes.* as * | eval src=coalesce(src,dest) | search user=\"$user$\" OR src=\"$src$\" | table firstTime, lastTime, user, src, process_name, process, parent_process_name, count | sort - count","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.rule_description = AI-assisted lateral movement by $user$ on $src$: AI tools ($ai_tools$) used alongside lateral movement tools ($lateral_tools$).
action.notable.param.rule_title = HDSI AI Assisted Lateral Movement ($user$)
action.notable.param.security_domain = threat
action.notable.param.severity = high
action.notable.param.verbose = 0
alert.digest_mode = 1
action.risk = 1
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score":45},{"risk_object_field":"src","risk_object_type":"system","risk_score":25}]
action.risk.param._risk_message = AI-assisted lateral movement by $user$ on $src$: AI tools ($ai_tools$) used alongside lateral movement tools ($lateral_tools$).
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user,src
alert.suppress.period = 3600s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 2-59/5 * * * *
description = Detect AI CLI tool execution followed by remote access tool usage within a 15-minute time window, indicating AI-assisted lateral movement. MITRE: T1021
disabled = 0
dispatch.earliest_time = -15m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count min(_time) as firstTime max(_time) as lastTime values(Processes.process) as process from datamodel=Endpoint.Processes where Processes.process_name IN ("codex","codex.exe","claude","claude.exe","gemini","gemini.exe","gh-copilot","gh-copilot.exe","aider","aider.exe","sgpt","sgpt.exe","llm","llm.exe","tgpt","tgpt.exe","mods","mods.exe","fabric","fabric.exe","aichat","aichat.exe","amazon-q","amazon-q.exe","openai","openai.exe","cline","cline.exe") by Processes.user Processes.dest Processes.process_name _time span=5m \
	| rename Processes.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(dest,"unknown"), _source="ai_cli", ai_command=coalesce(process,"") \
	| append [| tstats summariesonly=t allow_old_summaries=t count min(_time) as firstTime max(_time) as lastTime values(Processes.process) as process from datamodel=Endpoint.Processes where Processes.process_name IN ("ssh","ssh.exe","psexec","psexec.exe","wmic","wmic.exe","winrm","winrm.cmd","net","net.exe","smbclient","xfreerdp","rdesktop","mstsc","mstsc.exe") by Processes.user Processes.dest Processes.process_name _time span=5m \
	| rename Processes.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(dest,"unknown"), _source="lateral", lateral_command=coalesce(process,"")] \
	| stats sum(eval(if(_source="ai_cli",count,0))) as ai_cli_count sum(eval(if(_source="lateral",count,0))) as lateral_count values(eval(if(_source="ai_cli",process_name,null()))) as ai_tools values(eval(if(_source="lateral",process_name,null()))) as lateral_tools values(eval(if(_source="lateral",lateral_command,null()))) as lateral_commands min(firstTime) as firstTime max(lastTime) as lastTime by user src _time \
	| eval lateral_command_blob=lower(mvjoin(lateral_commands," ")) \
	| eval has_remote_target=if(match(lateral_command_blob,"(?:/v:|/node:|@[a-z0-9._-]+|[0-9]{1,3}(?:\\.[0-9]{1,3}){3}|[a-z0-9._-]+\\$)"),1,0) \
	| where ai_cli_count>=1 AND lateral_count>=1 AND has_remote_target=1 \
	| stats sum(ai_cli_count) as ai_cli_count sum(lateral_count) as lateral_count values(ai_tools) as ai_tools values(lateral_tools) as lateral_tools values(lateral_commands) as lateral_commands min(firstTime) as firstTime max(lastTime) as lastTime by user src \
	| eval provider="AI CLI" \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| eval ai_activity="ai_lateral_movement", detection_id="hdsi_ai_assisted_lateral_movement", mitre_attack="T1021", ai_kill_chain_phase="collection" \
	| `hdsi_ai_assisted_lateral_movement_filter` \
	| `hdsi_ai_assisted_lateral_movement_customizations`
