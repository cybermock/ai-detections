[Endpoint - HDSI AI Deepfake Tool Execution/Access - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI Deepfake Tool Execution/Access
action.correlationsearch.annotations = {"mitre_attack": ["T1588.005"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.rule_title = HDSI AI Deepfake Tool Execution/Access ($user$)
action.notable.param.rule_description = Deepfake tool execution by $user$ on $src$: $tools$ ($categories$, risk=$risk_levels$).
action.notable.param.security_domain = endpoint
action.notable.param.severity = high
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View related process activity","search":"| tstats summariesonly=t count min(_time) as firstTime max(_time) as lastTime values(Processes.process) as process values(Processes.process_name) as process_name values(Processes.parent_process_name) as parent_process_name by Processes.user Processes.dest | rename Processes.* as * | eval src=coalesce(src,dest) | search user=\"$user$\" OR src=\"$src$\" | table firstTime, lastTime, user, src, process_name, process, parent_process_name, count | sort - count","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.verbose = 0
action.risk = 1
action.risk.param._risk_message = Deepfake tool execution by $user$ on $src$: $tools$ ($categories$, risk=$risk_levels$).
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score": 50},{"risk_object_field":"src","risk_object_type":"system","risk_score": 30}]
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.digest_mode = 1
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user,src,process_name
alert.suppress.period = 3600s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 3-59/5 * * * *
description = Detect execution of known deepfake and synthetic media tools on endpoints. MITRE: T1588.005
disabled = 0
dispatch.earliest_time = -15m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count min(_time) as firstTime max(_time) as lastTime values(Processes.process) as process values(Processes.process_path) as process_path from datamodel=Endpoint.Processes where [ \
	| inputlookup ai_deepfake_tools \
	| where enabled=1 \
	| fields process_name \
	| rename process_name as Processes.process_name \
	| format ] by Processes.user Processes.dest Processes.process_name \
	| rename Processes.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(dest,"unknown"), process_name_lc=lower(process_name) \
	| lookup ai_deepfake_tools process_name as process_name_lc OUTPUTNEW tool_name category risk_level enabled as tool_enabled \
	| where tool_enabled=1 \
	| stats sum(count) as executions values(tool_name) as tools values(category) as categories values(risk_level) as risk_levels min(firstTime) as firstTime max(lastTime) as lastTime by user src process_name \
	| eval provider="Deepfake Tool" \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| eval ai_activity="deepfake_tool", detection_id="AI-034", mitre_attack="T1588.005", ai_kill_chain_phase="staging" \
	| `hdsi_ai_deepfake_tool_execution_access_filter` \
	| `hdsi_ai_deepfake_tool_execution_access_customizations`
