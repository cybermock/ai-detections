[Network - HDSI AI New Provider Adoption Velocity - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI New Provider Adoption Velocity
action.correlationsearch.annotations = {"mitre_attack": ["T1071.001"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.rule_title = HDSI AI New Provider Adoption Velocity ($user$)
action.notable.param.rule_description = Rapid AI provider adoption by $user$ from $src$: $new_providers$ new providers in velocity window ($providers$).
action.notable.param.security_domain = network
action.notable.param.severity = low
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View related web activity","search":"| tstats summariesonly=t count sum(Web.bytes_out) as bytes_out sum(Web.bytes_in) as bytes_in values(Web.url) as url values(Web.http_user_agent) as http_user_agent values(Web.dest) as dest min(_time) as firstTime max(_time) as lastTime from datamodel=Web where Web.url_domain=* by Web.user Web.src Web.url_domain | rename Web.* as * | search user=\"$user$\" OR src=\"$src$\" | eval mb_out=round(bytes_out/1024/1024,2), mb_in=round(bytes_in/1024/1024,2) | table firstTime, lastTime, user, src, url_domain, count, mb_out, mb_in, dest, http_user_agent, url | sort - count","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.verbose = 0
action.risk = 1
action.risk.param._risk_message = Rapid AI provider adoption by $user$ from $src$: $new_providers$ new providers in velocity window ($providers$).
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score": 20},{"risk_object_field":"src","risk_object_type":"system","risk_score": 10}]
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.digest_mode = 1
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user
alert.suppress.period = 86400s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 0 5 * * *
description = Detect users rapidly adopting multiple new AI providers within a short window (default: 3+ new providers in 7 days). MITRE: T1071.001
disabled = 0
dispatch.earliest_time = -8d@d
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count min(_time) as firstTime from datamodel=Web where Web.url_domain=* by Web.user Web.src Web.url_domain \
	| rename Web.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(src,"unknown"), ai_domain=lower(url_domain) \
	| `ai_domains_filter` \
	| stats min(firstTime) as first_seen by user src provider \
	| eval control_name="new_provider_velocity_days" \
	| lookup ai_detection_config control_name OUTPUTNEW value as velocity_days \
	| eval control_name="new_provider_velocity_count" \
	| lookup ai_detection_config control_name OUTPUTNEW value as velocity_count \
	| eval velocity_days=coalesce(tonumber(velocity_days),7), velocity_count=coalesce(tonumber(velocity_count),3) \
	| where first_seen>=relative_time(now(),"-"+tostring(velocity_days)+"d") \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| stats dc(provider) as new_providers values(provider) as providers min(first_seen) as firstTime by user src \
	| eval control_name="new_provider_velocity_count" \
	| lookup ai_detection_config control_name OUTPUTNEW value as velocity_count \
	| eval velocity_count=coalesce(tonumber(velocity_count),3) \
	| where new_providers>=velocity_count \
	| eval provider=mvjoin(providers,",") \
	| eval ai_activity="provider_adoption_velocity", detection_id="hdsi_ai_new_provider_adoption_velocity", mitre_attack="T1071.001", ai_kill_chain_phase="recon" \
	| `hdsi_ai_new_provider_adoption_velocity_filter` \
	| `hdsi_ai_new_provider_adoption_velocity_customizations`
