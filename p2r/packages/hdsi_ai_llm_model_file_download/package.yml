version: 1.0.0
package_title: HDSI AI LLM Model File Download
creation_date: '2026-03-04'
author: Hurricane Labs
description: "Detect downloads of LLM model files (GGUF, GGML, SafeTensors) from HuggingFace, Ollama registry, and other model repositories. Large model downloads indicate local LLM setup. MITRE: T1105"
enable_alerting: false
app_context: HurricaneLabsContentUpdates
common_dependencies:
  - macros:ai_domains_filter
  - macros:ai_unsanctioned_filter
tags:
  - rba_only
  - web
  - proxy
app_compatibility:
  - app_name: SplunkEnterpriseSecuritySuite
    operator: ">="
    required_version: "8.0.0"
data_prereqs:
  datamodels:
    op: AND
    items:
    - "Web"
deployment_type: global
prereq_packages:
  - hdsi_ai_rba_common
