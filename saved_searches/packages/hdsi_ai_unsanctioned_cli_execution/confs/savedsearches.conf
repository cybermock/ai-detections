[Endpoint - HDSI AI Unsanctioned CLI Execution - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI Unsanctioned CLI Execution
action.correlationsearch.annotations = {"mitre_attack": ["T1059"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View related process activity","search":"| tstats summariesonly=t count min(_time) as firstTime max(_time) as lastTime values(Processes.process) as process values(Processes.process_name) as process_name values(Processes.parent_process_name) as parent_process_name by Processes.user Processes.dest | rename Processes.* as * | eval src=coalesce(src,dest) | search user=\"$user$\" OR src=\"$src$\" | table firstTime, lastTime, user, src, process_name, process, parent_process_name, count | sort - count","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.rule_description = Unsanctioned AI CLI execution by $user$ on $src$ using $process_name$.
action.notable.param.rule_title = HDSI AI Unsanctioned CLI Execution ($user$)
action.notable.param.security_domain = endpoint
action.notable.param.severity = low
action.notable.param.verbose = 0
alert.digest_mode = 1
action.risk = 1
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score":25},{"risk_object_field":"src","risk_object_type":"system","risk_score":15}]
action.risk.param._risk_message = Unsanctioned AI CLI execution by $user$ on $src$ using $process_name$.
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user,src,process_name
alert.suppress.period = 3600s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 0-59/5 * * * *
description = Detect unsanctioned use of AI CLI tools including codex, claude, gemini, aider, sgpt, llm, tgpt, mods, fabric, aichat, amazon-q, openai, cline, and gh-copilot. MITRE: T1059
disabled = 0
dispatch.earliest_time = -15m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count min(_time) as firstTime max(_time) as lastTime values(Processes.process) as process values(Processes.original_file_name) as original_file_name from datamodel=Endpoint.Processes where Processes.process_name IN ("codex","codex.exe","claude","claude.exe","gemini","gemini.exe","gh-copilot","gh-copilot.exe","aider","aider.exe","sgpt","sgpt.exe","llm","llm.exe","tgpt","tgpt.exe","mods","mods.exe","fabric","fabric.exe","aichat","aichat.exe","amazon-q","amazon-q.exe","openai","openai.exe","cline","cline.exe") by Processes.user Processes.dest Processes.process_name Processes.parent_process_name \
	| rename Processes.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(dest,"unknown"), process_name_lc=lower(process_name), parent_process_name_lc=lower(coalesce(parent_process_name,"")) \
	| `ai_process_filter` \
	| eval provider=coalesce(provider,case(match(process_name_lc,"codex|openai"),"OpenAI",match(process_name_lc,"claude"),"Anthropic",match(process_name_lc,"gemini"),"Google Gemini",match(process_name_lc,"gh-copilot"),"Microsoft Copilot",match(process_name_lc,"aider"),"Aider",match(process_name_lc,"sgpt"),"Shell GPT",match(process_name_lc,"llm"),"LLM CLI",match(process_name_lc,"tgpt"),"tgpt",match(process_name_lc,"mods"),"Charm",match(process_name_lc,"fabric"),"Fabric",match(process_name_lc,"aichat"),"aichat",match(process_name_lc,"amazon-q"),"Amazon",match(process_name_lc,"cline"),"Cline",true(),"AI CLI")) \
	| eval _generic_name=if(match(process_name_lc,"^(llm|llm\.exe|claude|claude\.exe|fabric|fabric\.exe|mods|mods\.exe|cline|cline\.exe)$"),1,0) \
	| where (usage_type="cli" AND _generic_name=0) OR (_generic_name=1 AND match(parent_process_name_lc,"cmd|powershell|pwsh|bash|zsh|sh|terminal|wt|conhost|iterm|alacritty|kitty|tmux|screen")) \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| eval ai_activity="cli_execution", detection_id="hdsi_ai_unsanctioned_cli_execution", mitre_attack="T1059", ai_kill_chain_phase="execution" \
	| `hdsi_ai_unsanctioned_cli_execution_filter` \
	| `hdsi_ai_unsanctioned_cli_execution_customizations`
