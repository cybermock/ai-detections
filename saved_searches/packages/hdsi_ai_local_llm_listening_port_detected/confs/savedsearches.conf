[Network - HDSI AI Local LLM Listening Port Detected - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI Local LLM Listening Port Detected
action.correlationsearch.annotations = {"mitre_attack": ["T1219"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View related network traffic","search":"| tstats summariesonly=t count sum(All_Traffic.bytes_in) as bytes_in sum(All_Traffic.bytes_out) as bytes_out min(_time) as firstTime max(_time) as lastTime values(All_Traffic.dest) as dest values(All_Traffic.dest_port) as dest_port values(All_Traffic.transport) as transport from datamodel=Network_Traffic where All_Traffic.dest=* by All_Traffic.src | rename All_Traffic.* as * | search src=\"$src$\" | eval mb_out=round(bytes_out/1024/1024,2), mb_in=round(bytes_in/1024/1024,2) | table firstTime, lastTime, src, dest, dest_port, transport, count, mb_in, mb_out | sort - count","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.rule_description = Local LLM service(s) active on $src$: $llm_services$ on port(s) $ports$ ($connections$ connections).
action.notable.param.rule_title = HDSI AI Local LLM Listening Port Detected ($src$)
action.notable.param.security_domain = network
action.notable.param.severity = medium
action.notable.param.verbose = 0
alert.digest_mode = 1
action.risk = 1
action.risk.param._risk = [{"risk_object_field":"src","risk_object_type":"system","risk_score":30}]
action.risk.param._risk_message = Local LLM service(s) active on $src$: $llm_services$ on port(s) $ports$ ($connections$ connections).
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = src,ports
alert.suppress.period = 3600s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 0-59/5 * * * *
description = Detect network connections to well-known local LLM service ports (Ollama 11434, LM Studio 1234/43411, Jan 1337, GPT4All 4891). Indicates an active local LLM server. MITRE: T1219
disabled = 0
dispatch.earliest_time = -15m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count min(_time) as firstTime max(_time) as lastTime from datamodel=Network_Traffic where All_Traffic.dest_port IN (11434,1234,43411,1337,4891) AND All_Traffic.transport="tcp" AND (All_Traffic.src_ip="127.0.0.1" OR All_Traffic.dest_ip="127.0.0.1" OR All_Traffic.src="127.0.0.1" OR All_Traffic.dest="127.0.0.1" OR All_Traffic.src_ip="0.0.0.0" OR All_Traffic.src="0.0.0.0") by All_Traffic.src All_Traffic.dest All_Traffic.dest_port \
	| rename All_Traffic.* as * \
	| eval service=case(dest_port=11434,"Ollama",dest_port=1234 OR dest_port=43411,"LM Studio",dest_port=1337,"Jan.ai",dest_port=4891,"GPT4All",true(),"Unknown LLM"), user="unknown", provider="Local LLM" \
	| stats sum(count) as connections values(service) as llm_services values(dest_port) as ports min(firstTime) as firstTime max(lastTime) as lastTime by src \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| eval ai_activity="local_llm_port", detection_id="hdsi_ai_local_llm_listening_port_detected", mitre_attack="T1219", ai_kill_chain_phase="persistence" \
	| `hdsi_ai_local_llm_listening_port_detected_filter` \
	| `hdsi_ai_local_llm_listening_port_detected_customizations`
