version: 1.0.0
creation_date: '2026-03-04'
package_title: HDSI AI Multiple Services In Single Session
description: "Detect users accessing 3+ distinct AI services within a single hour. May indicate prompt shopping or data exfiltration across multiple channels. MITRE: T1567.002"
author: Hurricane Labs
app_compatibility:
  - app_name: SplunkEnterpriseSecuritySuite
    operator: '*'
    required_version: '*'
app_context: HurricaneLabsContentUpdates
enable_alerting: false
common_dependencies:
  - macros:ai_domains_filter
  - macros:ai_unsanctioned_filter
tags:
  - rba_only
  - web
  - proxy
data_prereqs:
  datamodels:
    op: AND
    items:
    - "Web"
deployment_type: global
prereq_packages:
  - hdsi_ai_rba_common
