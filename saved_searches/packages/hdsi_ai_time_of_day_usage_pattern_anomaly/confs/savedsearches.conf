[Network - HDSI AI Time-of-Day Usage Pattern Anomaly - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI Time-of-Day Usage Pattern Anomaly
action.correlationsearch.annotations = {"mitre_attack": ["T1567.002"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View related web activity","search":"| tstats summariesonly=t count sum(Web.bytes_out) as bytes_out sum(Web.bytes_in) as bytes_in values(Web.url) as url values(Web.http_user_agent) as http_user_agent values(Web.dest) as dest min(_time) as firstTime max(_time) as lastTime from datamodel=Web where Web.url_domain=* by Web.user Web.src Web.url_domain | rename Web.* as * | search user=\"$user$\" OR src=\"$src$\" | eval mb_out=round(bytes_out/1024/1024,2), mb_in=round(bytes_in/1024/1024,2) | table firstTime, lastTime, user, src, url_domain, count, mb_out, mb_in, dest, http_user_agent, url | sort - count","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.rule_description = Time-of-day AI usage anomaly for $user$ at hour $hour$: $hourly_requests$ requests (z=$z_score$, avg=$user_hour_avg$).
action.notable.param.rule_title = HDSI AI Time-of-Day Usage Pattern Anomaly ($user$)
action.notable.param.security_domain = network
action.notable.param.severity = low
action.notable.param.verbose = 0
alert.digest_mode = 1
action.risk = 1
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score":25}]
action.risk.param._risk_message = Time-of-day AI usage anomaly for $user$ at hour $hour$: $hourly_requests$ requests (z=$z_score$, avg=$user_hour_avg$).
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user,hour
alert.suppress.period = 86400s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 45 4 * * *
description = Detect users whose AI usage time-of-day pattern deviates significantly from their historical pattern using per-user hourly histogram analysis. MITRE: T1567.002
disabled = 0
dispatch.earliest_time = -30d@d
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count from datamodel=Web where Web.url_domain=* by Web.user Web.url_domain _time span=1h \
	| rename Web.* as * \
	| eval ai_domain=lower(url_domain) \
	| `ai_domains_filter` \
	| eval hour=tonumber(strftime(_time,"%H")), day=strftime(_time,"%Y-%m-%d") \
	| stats sum(count) as hourly_requests by user hour day \
	| eventstats avg(hourly_requests) as user_hour_avg stdev(hourly_requests) as user_hour_stdev count as datapoints by user hour \
	| eval control_name="time_anomaly_zscore" \
	| lookup ai_detection_config control_name OUTPUTNEW value as time_zscore \
	| eval time_zscore=coalesce(tonumber(time_zscore),3) \
	| where datapoints>=7 \
	| eval z_score=if(user_hour_stdev>0,round((hourly_requests-user_hour_avg)/user_hour_stdev,2),if(hourly_requests>user_hour_avg*2,99,0)) \
	| where z_score>time_zscore \
	| where day>=strftime(relative_time(now(),"-1d@d"),"%Y-%m-%d") \
	| eval src="unknown", provider="Multiple" \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| eval ai_activity="time_pattern_anomaly", detection_id="hdsi_ai_time_of_day_usage_pattern_anomaly", mitre_attack="T1567.002", ai_kill_chain_phase="exfiltration" \
	| `hdsi_ai_time_of_day_usage_pattern_anomaly_filter` \
	| `hdsi_ai_time_of_day_usage_pattern_anomaly_customizations`
