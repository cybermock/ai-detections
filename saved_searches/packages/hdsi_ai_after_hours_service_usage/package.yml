version: 1.0.0
creation_date: '2026-03-04'
package_title: HDSI AI After Hours Service Usage
description: "Detect AI service usage outside business hours (configurable, default before 6AM or after 8PM, or on weekends). After-hours usage may indicate data exfiltration or reduced oversight. MITRE: T1567.002"
author: Hurricane Labs
app_compatibility:
  - app_name: SplunkEnterpriseSecuritySuite
    operator: '*'
    required_version: '*'
app_context: HurricaneLabsContentUpdates
enable_alerting: false
common_dependencies:
  - macros:ai_domains_filter
  - macros:ai_unsanctioned_filter
tags:
  - rba_only
  - web
  - proxy
data_prereqs:
  datamodels:
    op: AND
    items:
    - "Web"
deployment_type: global
prereq_packages:
  - hdsi_ai_rba_common
