action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View related web activity","search":"| tstats summariesonly=t count sum(Web.bytes_out) as bytes_out sum(Web.bytes_in) as bytes_in values(Web.url) as url values(Web.http_user_agent) as http_user_agent values(Web.dest) as dest min(_time) as firstTime max(_time) as lastTime from datamodel=Web where Web.url_domain=* by Web.user Web.src Web.url_domain | rename Web.* as * | search user=\"$user$\" OR src=\"$src$\" | eval mb_out=round(bytes_out/1024/1024,2), mb_in=round(bytes_in/1024/1024,2) | table firstTime, lastTime, user, src, url_domain, count, mb_out, mb_in, dest, http_user_agent, url | sort - count","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.rule_description = AI browser extension high-volume data transmission by $user$ from $src$ ($total_mb$ MB to $provider$).
action.notable.param.rule_title = HDSI AI Browser Extension High-Volume Data Transmission ($user$)
action.notable.param.security_domain = network
action.notable.param.severity = medium
action.notable.param.verbose = 0
alert.digest_mode = 1
action.risk = 1
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score":30},{"risk_object_field":"src","risk_object_type":"system","risk_score":15}]
action.risk.param._risk_message = AI browser extension high-volume data transmission by $user$ from $src$ ($total_mb$ MB to $provider$).
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user,src,provider
alert.suppress.period = 3600s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 4-59/5 * * * *
description = Detect AI browser extensions transmitting high volumes of data, indicating potential bulk page content exfiltration. MITRE: T1176
disabled = 0
dispatch.earliest_time = -15m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count sum(Web.bytes_out) as bytes_out min(_time) as firstTime max(_time) as lastTime values(Web.url) as urls from datamodel=Web where Web.url_domain=* by Web.user Web.src Web.url_domain Web.http_user_agent \
	| rename Web.* as * \
	| eval user=coalesce(user,"unknown"), src=coalesce(src,"unknown"), ai_domain=lower(url_domain), http_user_agent_lc=lower(coalesce(http_user_agent,"")), bytes_out_mb=round(bytes_out/1024/1024,2) \
	| eval _is_ext_ua=if(match(http_user_agent_lc,"chrome-extension|moz-extension"),1,0) \
	| where ai_domain IN ("extensions.chat.openai.com","browser.claude.ai","copilot.microsoft.com") OR _is_ext_ua=1 \
	| eval enabled=if(_is_ext_ua=1,"1",null()) \
	| `ai_domains_filter` \
	| eval provider=coalesce(provider,if(_is_ext_ua=1,"Browser Extension",null())) \
	| where isnotnull(provider) \
	| eval control_name="extension_bytes_threshold_mb" \
	| lookup ai_detection_config control_name OUTPUTNEW value as ext_threshold_mb \
	| eval ext_threshold_mb=coalesce(tonumber(ext_threshold_mb),10) \
	| where bytes_out_mb>=ext_threshold_mb \
	| stats sum(count) as request_count sum(bytes_out_mb) as total_mb values(ai_domain) as ai_domains min(firstTime) as firstTime max(lastTime) as lastTime by user src provider \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| eval ai_activity="extension_high_volume", detection_id="hdsi_ai_browser_extension_high_volume_data_transmission", mitre_attack="T1176", ai_kill_chain_phase="exfiltration" \
	| `hdsi_ai_browser_extension_high_volume_data_transmission_filter` \
	| `hdsi_ai_browser_extension_high_volume_data_transmission_customizations`
