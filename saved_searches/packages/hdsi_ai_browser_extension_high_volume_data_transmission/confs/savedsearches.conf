action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI Browser Extension High-Volume Data Transmission
action.correlationsearch.annotations = {"mitre_attack": ["T1176"]}
action.customsearchbuilder.enabled = 0
