[Network - HDSI AI Code Assistant Network Connection - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI AI Code Assistant Network Connection
action.correlationsearch.annotations = {"mitre_attack": ["T1071.001"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View associated risk events","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" | table _time, source, risk_score, risk_object, risk_object_type, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"View related network traffic","search":"| tstats summariesonly=t count sum(All_Traffic.bytes_in) as bytes_in sum(All_Traffic.bytes_out) as bytes_out min(_time) as firstTime max(_time) as lastTime values(All_Traffic.dest) as dest values(All_Traffic.dest_port) as dest_port values(All_Traffic.transport) as transport from datamodel=Network_Traffic where All_Traffic.dest=* by All_Traffic.src | rename All_Traffic.* as * | search src=\"$src$\" | eval mb_out=round(bytes_out/1024/1024,2), mb_in=round(bytes_in/1024/1024,2) | table firstTime, lastTime, src, dest, dest_port, transport, count, mb_in, mb_out | sort - count","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.rule_description = IDE/editor $ide_apps$ on $src$ connected to AI backend(s): $ai_backends$ ($connections$ connections).
action.notable.param.rule_title = HDSI AI Code Assistant Network Connection ($src$)
action.notable.param.security_domain = network
action.notable.param.severity = informational
action.notable.param.verbose = 0
alert.digest_mode = 1
action.risk = 1
action.risk.param._risk = [{"risk_object_field":"src","risk_object_type":"system","risk_score":15}]
action.risk.param._risk_message = IDE/editor $ide_apps$ on $src$ connected to AI backend(s): $ai_backends$ ($connections$ connections).
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = src,provider
alert.suppress.period = 3600s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 0-59/5 * * * *
description = Detect IDE and code editor processes making network connections to AI backend services. Correlates application with AI destination. MITRE: T1071.001
disabled = 0
dispatch.earliest_time = -15m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = | tstats summariesonly=t allow_old_summaries=t count min(_time) as firstTime max(_time) as lastTime from datamodel=Network_Traffic where All_Traffic.app IN ("code","code.exe","code-insiders","cursor","cursor.exe","windsurf","windsurf.exe","idea64.exe","pycharm64.exe","webstorm64.exe","devenv.exe","vshost*.exe") AND All_Traffic.dest=* by All_Traffic.src All_Traffic.app All_Traffic.dest \
	| rename All_Traffic.* as * \
	| eval dest_lc=lower(coalesce(dest,"")), user="unknown" \
	| where match(dest_lc,"api\\.openai\\.com|api\\.anthropic\\.com|api\\.claude\\.ai|api\\.githubcopilot\\.com|copilot-proxy\\.githubusercontent\\.com|codeium\\.com|api\\.sourcegraph\\.com|cursor\\.sh|api\\.cursor\\.sh|generativelanguage\\.googleapis\\.com|continue\\.dev|api\\.fireworks\\.ai|openrouter\\.ai|api\\.cohere\\.ai|api\\.deepseek\\.com|api\\.groq\\.com|api\\.mistral\\.ai|api\\.perplexity\\.ai|api\\.replicate\\.com|api\\.stability\\.ai|api\\.together\\.xyz|api\\.x\\.ai|openai\\.azure\\.com|pieces\\.app") \
	| eval provider=case(match(dest_lc,"openai|azure"),"OpenAI",match(dest_lc,"anthropic|claude"),"Anthropic",match(dest_lc,"copilot|githubusercontent"),"Microsoft Copilot",match(dest_lc,"codeium"),"Codeium",match(dest_lc,"sourcegraph"),"Sourcegraph",match(dest_lc,"cursor"),"Cursor",match(dest_lc,"googleapis"),"Google Gemini",match(dest_lc,"continue"),"Continue",match(dest_lc,"fireworks"),"Fireworks",match(dest_lc,"openrouter"),"OpenRouter",match(dest_lc,"cohere"),"Cohere",match(dest_lc,"deepseek"),"DeepSeek",match(dest_lc,"groq"),"Groq",match(dest_lc,"mistral"),"Mistral",match(dest_lc,"perplexity"),"Perplexity",match(dest_lc,"replicate"),"Replicate",match(dest_lc,"stability"),"Stability AI",match(dest_lc,"together"),"Together",match(dest_lc,"api\\.x\\.ai|grok"),"xAI",match(dest_lc,"pieces"),"Pieces",true(),"Unknown") \
	| stats sum(count) as connections values(app) as ide_apps values(dest) as ai_backends min(firstTime) as firstTime max(lastTime) as lastTime by src provider \
	| `ai_unsanctioned_filter(user,src,provider)` \
	| eval ai_activity="code_assistant_network", detection_id="hdsi_ai_code_assistant_network_connection", mitre_attack="T1071.001", ai_kill_chain_phase="collection" \
	| `hdsi_ai_code_assistant_network_connection_filter` \
	| `hdsi_ai_code_assistant_network_connection_customizations`
