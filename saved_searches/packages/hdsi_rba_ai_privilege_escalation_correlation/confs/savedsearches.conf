[Threat - HDSI RBA AI Privilege Escalation Correlation - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = HDSI RBA AI Privilege Escalation Correlation
action.correlationsearch.annotations = {"mitre_attack": ["T1078"]}
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.email = 0
action.notable = 1
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"View contributing AI detections","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" NOT source=\"*HDSI RBA*\" | table _time, source, risk_score, risk_object, risk_message | sort - _time","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"},{"name":"Summarize user AI risk composition","search":"| from datamodel:\"Risk.All_Risk\" where All_Risk.risk_object=\"$risk_object$\" source=\"*HDSI AI*\" NOT source=\"*HDSI RBA*\" | stats count as event_count sum(risk_score) as total_risk values(source) as contributing_searches by risk_object risk_object_type | eval contributing_searches=mvjoin(contributing_searches, \"; \") | table risk_object, risk_object_type, event_count, total_risk, contributing_searches","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$"}]
action.notable.param.rule_description = User $user$ showed privilege escalation signals followed by AI service usage.
action.notable.param.rule_title = Privilege Escalation Plus AI Usage ($user$)
action.notable.param.security_domain = threat
action.notable.param.severity = high
action.notable.param.verbose = 0
alert.digest_mode = 1
action.risk = 1
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score":70}]
action.risk.param._risk_message = Privilege escalation + AI usage correlation for $user$: $priv_signals$ privilege signal(s) + $ai_signals$ AI signal(s). Total risk: $total_risk$.
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
alert.managedBy =
alert.suppress = 1
alert.suppress.fields = user
alert.suppress.period = 14400s
alert.track = 1
allow_skew = 5m
counttype = number of events
cron_schedule = 9-59/15 * * * *
description = Detect privilege escalation events followed by AI service usage, indicating an attacker leveraging elevated access to exfiltrate via AI.
disabled = 0
dispatch.earliest_time = -4h@h
dispatch.latest_time = now
dispatch.rt_backfill = 1
dispatch.ttl = 2p
enableSched = 1
realtime_schedule = 0
relation = greater than
quantity = 0
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = index=risk earliest=-4h@h latest=now risk_object_type="user" \
	| eval ai_signal=if(match(search_name,"^HDSI AI ") AND NOT match(search_name,"^HDSI RBA"),1,0), priv_signal=if(NOT match(search_name,"^HDSI AI ") AND NOT match(search_name,"^HDSI RBA") AND (match(search_name,"Privilege Escalation|T1078|T1134|T1548|Admin") OR match(mitre_attack,"T1078|T1134|T1548")),1,0) \
	| stats sum(risk_score) as total_risk sum(priv_signal) as priv_signals sum(ai_signal) as ai_signals values(search_name) as detections values(detection_id) as detection_ids min(_time) as firstTime max(_time) as lastTime by risk_object \
	| eval user=risk_object \
	| where priv_signals>=1 AND ai_signals>=1 \
	| `hdsi_rba_ai_privilege_escalation_correlation_filter` \
	| `hdsi_rba_ai_privilege_escalation_correlation_customizations`
