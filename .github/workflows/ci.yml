name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

      - name: Lint tests
        run: ruff check tests/

  appinspect:
    name: Splunk AppInspect
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build .spl package
        run: bash deploy/build.sh "$(cat VERSION)"

      - name: Install AppInspect
        run: pip install splunk-appinspect

      - name: Run AppInspect
        run: |
          SPL_FILE=$(ls build/*.spl)
          echo "Inspecting: $SPL_FILE"
          splunk-appinspect inspect "$SPL_FILE" --mode precert --included-tags cloud 2>&1 || true
