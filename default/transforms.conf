### ============================================================================
### KV Store-backed lookup alternatives (for production scaling)
### ============================================================================
### To switch from CSV to KV Store: rename the CSV-based stanza (e.g.,
### ai_sanctioned_entities → ai_sanctioned_entities_csv) and rename the
### KV Store stanza to the original name.
### ============================================================================

[ai_sanctioned_entities_kvstore]
collection = ai_sanctioned_entities_collection
external_type = kvstore
fields_list = entity_type, entity, provider, scope, expires, enabled, allow_key
case_sensitive_match = false

[ai_detection_config_kvstore]
collection = ai_detection_config_collection
external_type = kvstore
fields_list = control_name, value, notes
case_sensitive_match = false

[ai_provider_domains_kvstore]
collection = ai_provider_domains_collection
external_type = kvstore
fields_list = provider, domain, usage_type, severity_weight, enabled, notes, source, first_seen, last_verified, confidence
case_sensitive_match = false

[ai_tool_processes_kvstore]
collection = ai_tool_processes_collection
external_type = kvstore
fields_list = tool, provider, process_name_lc, original_file_name_lc, platform, usage_type, enabled, notes
case_sensitive_match = false

[ai_api_key_patterns_kvstore]
collection = ai_api_key_patterns_collection
external_type = kvstore
fields_list = pattern_id, provider, regex_pattern, description, severity, enabled
case_sensitive_match = false
