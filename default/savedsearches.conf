[AI RBA - Health - Lookup Staleness Alert]
description = Weekly check for AI RBA lookup files that have not been updated in 90+ days. Sends email alert for stale lookups requiring maintenance.
search = | rest /services/data/lookup-table-files splunk_server=local | where match(title, "^ai_") | eval updated_epoch=strptime(updated, "%Y-%m-%dT%H:%M:%S") | eval age_days=round((now() - updated_epoch) / 86400, 0) | where age_days > 90 | eval severity=case(age_days>180, "Critical", age_days>120, "High", true(), "Warning") | table title, age_days, severity, updated | rename title as lookup_file, age_days as days_since_update, updated as last_updated | eval _ctl="alert_email_to" | lookup ai_detection_config control_name as _ctl OUTPUTNEW value as alert_email_to | eval alert_email_to=coalesce(alert_email_to,"soc-alerts@company.com") | table lookup_file, days_since_update, severity, last_updated, alert_email_to | sort - days_since_update
cron_schedule = 0 9 * * 1
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
enableSched = 1
disabled = 0
alert.track = 1
alert.suppress = 1
alert.suppress.period = 7d
alert.suppress.fields = lookup_file
action.risk = 0
action.notable = 0
action.email = 1
### DEPLOY: Set alert_email_to in ai_detection_config.csv (used by $result.alert_email_to$ token)
action.email.to = $result.alert_email_to$
action.email.subject = AI RBA - Stale Lookup Files Detected
action.email.message.alert = One or more AI RBA lookup files have not been updated in over 90 days and may contain outdated data. Review and update the listed lookup files.

[AI RBA - Health - Data Model Availability]
description = Hourly verification that required data models (Web, Endpoint.Processes, Network_Traffic, Network_Resolution, Data_Loss_Prevention, Email, Endpoint.Filesystem) contain recent events. Alerts if any model has zero events in the last 2 hours.
search = | tstats count from datamodel=Web where earliest=-2h@h latest=now | eval model="Web" | append [| tstats count from datamodel=Endpoint.Processes where earliest=-2h@h latest=now | eval model="Endpoint.Processes"] | append [| tstats count from datamodel=Network_Traffic where earliest=-2h@h latest=now | eval model="Network_Traffic"] | append [| tstats count from datamodel=Network_Resolution where earliest=-2h@h latest=now | eval model="Network_Resolution"] | append [| tstats count from datamodel=Data_Loss_Prevention where earliest=-2h@h latest=now | eval model="Data_Loss_Prevention"] | append [| tstats count from datamodel=Email where earliest=-2h@h latest=now | eval model="Email"] | append [| tstats count from datamodel=Endpoint.Filesystem where earliest=-2h@h latest=now | eval model="Endpoint.Filesystem"] | where count=0 | table model, count | rename model as data_model, count as event_count | eval _ctl="alert_email_to" | lookup ai_detection_config control_name as _ctl OUTPUTNEW value as alert_email_to | eval alert_email_to=coalesce(alert_email_to,"soc-alerts@company.com") | table data_model, event_count, alert_email_to
cron_schedule = 0 * * * *
dispatch.earliest_time = -2h@h
dispatch.latest_time = now
enableSched = 1
disabled = 0
alert.track = 1
alert.suppress = 1
alert.suppress.period = 4h
alert.suppress.fields = data_model
action.risk = 0
action.notable = 0
action.email = 1
### DEPLOY: Set alert_email_to in ai_detection_config.csv (used by $result.alert_email_to$ token)
action.email.to = $result.alert_email_to$
