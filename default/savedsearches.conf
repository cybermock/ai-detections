[AI RBA - AI-DISCOVERY-001: Unknown High-Volume External API Discovery]
description = Discovery search to identify unknown high-volume external API endpoints that may be undocumented AI services. Not a detection - used for threat intelligence enrichment.
search = | tstats summariesonly=t allow_old_summaries=t count sum(Web.bytes_out) as bytes_out sum(Web.bytes_in) as bytes_in min(_time) as firstTime max(_time) as lastTime from datamodel=Web where Web.url_domain=* by Web.url_domain | rename Web.* as * | eval ai_domain=lower(url_domain) | lookup ai_provider_domains domain as ai_domain OUTPUTNEW provider | where isnull(provider) | eval control_name="discovery_api_count" | lookup ai_detection_config control_name OUTPUTNEW value as api_threshold | eval api_threshold=coalesce(tonumber(api_threshold),50) | where count>=api_threshold | eval mb_out=round(bytes_out/1024/1024,2), mb_in=round(bytes_in/1024/1024,2) | sort -count | head 100 | eval ai_activity="unknown_api_discovery", detection_id="AI-DISCOVERY-001", ai_kill_chain_phase="recon"
cron_schedule = 0 2 * * *
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
alert.suppress = 1
alert.suppress.period = 24h
alert.suppress.fields = url_domain
action.risk = 0
action.notable = 0
action.correlationsearch.label = AI-DISCOVERY-001: Unknown High-Volume External API Discovery
disabled = 1

