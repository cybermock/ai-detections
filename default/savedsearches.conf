[AI RBA - AI-007: High Volume Upload To AI Service]
description = Detect high data upload volume to AI providers with tiered risk scoring: 1MB (low), 5MB (medium), 10MB (high), 50MB (critical). MITRE: T1567.002
search = | tstats summariesonly=t allow_old_summaries=t sum(Web.bytes_out) as bytes_out count min(_time) as firstTime max(_time) as lastTime from datamodel=Web where Web.url_domain=* by Web.user Web.src Web.url_domain | rename Web.* as * | eval user=coalesce(user,"unknown"), src=coalesce(src,"unknown"), ai_domain=lower(url_domain) | `ai_domains_filter` | stats sum(bytes_out) as bytes_out sum(count) as request_count min(firstTime) as firstTime max(lastTime) as lastTime values(ai_domain) as ai_domains by user src provider | eval bytes_out_mb=round(bytes_out/1024/1024,2) | eval _ctl="upload_tier1_mb" | lookup ai_detection_config control_name as _ctl OUTPUTNEW value as tier1_mb | eval _ctl="upload_tier2_mb" | lookup ai_detection_config control_name as _ctl OUTPUTNEW value as tier2_mb | eval _ctl="upload_tier3_mb" | lookup ai_detection_config control_name as _ctl OUTPUTNEW value as tier3_mb | eval _ctl="upload_tier4_mb" | lookup ai_detection_config control_name as _ctl OUTPUTNEW value as tier4_mb | eval tier1_mb=coalesce(tonumber(tier1_mb),1), tier2_mb=coalesce(tonumber(tier2_mb),5), tier3_mb=coalesce(tonumber(tier3_mb),10), tier4_mb=coalesce(tonumber(tier4_mb),50) | where bytes_out_mb>=tier1_mb | eval upload_tier=case(bytes_out_mb>=tier4_mb,"critical",bytes_out_mb>=tier3_mb,"high",bytes_out_mb>=tier2_mb,"medium",bytes_out_mb>=tier1_mb,"low") | eval risk_score=case(upload_tier="critical",80,upload_tier="high",60,upload_tier="medium",40,upload_tier="low",20) | `ai_unsanctioned_filter(user,src,provider)` | `ai_risk_multiplier` | eval risk_score=round(risk_score*_final_multiplier) | eval ai_activity="upload_burst", detection_id="AI-007", mitre_attack="T1567.002", ai_kill_chain_phase="exfiltration"
