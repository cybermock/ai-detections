ame,usage_type_from_ofn), enabled=coalesce(enabled_from_name,enabled_from_ofn,if(match(process_path_lc,"chatgpt\\.app|claude\\.app|cursor\\.app|windsurf\\.app|lm studio\\.app|jan\\.app|pieces\\.app|continue\\.app|tabnine\\.app|trae\\.app|zed\\.app|warp\\.app"),1,null())) | eval is_desktop_app=if((usage_type="desktop_app") OR match(process_path_lc,"chatgpt\\.app|claude\\.app|cursor\\.app|windsurf\\.app|lm studio\\.app|jan\\.app|pieces\\.app|continue\\.app|tabnine\\.app|trae\\.app|zed\\.app|warp\\.app"),1,0) | where enabled=1 AND is_desktop_app=1 | `ai_unsanctioned_filter(user,src,provider)` | eval ai_activity="desktop_execution", detection_id="AI-005", mitre_attack="T1204.002", ai_kill_chain_phase="execution"
