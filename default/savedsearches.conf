search = index=risk earliest=-24h@h latest=now search_name="AI RBA - *" risk_object_type="user" | eval det_category=case(match(search_name,"AI-028|AI-022|AI-023|AI-026") OR match(detection_id,"AI-028|AI-022|AI-023|AI-026"),"shadow_ai",match(search_name,"AI-004|AI-005|AI-008|AI-011|AI-037|AI-039|AI-046") OR match(detection_id,"AI-004|AI-005|AI-008|AI-011|AI-037|AI-039|AI-046"),"execution",match(search_name,"AI-007|AI-015|AI-017|AI-018|AI-020|AI-027|AI-044|AI-038") OR match(detection_id,"AI-007|AI-015|AI-017|AI-018|AI-020|AI-027|AI-044|AI-038"),"exfiltration",match(search_name,"AI-030|AI-031|AI-033|AI-034|AI-035|AI-036|AI-045") OR match(detection_id,"AI-030|AI-031|AI-033|AI-034|AI-035|AI-036|AI-045"),"adversarial",match(search_name,"AI-040|AI-041|AI-042|AI-043") OR match(detection_id,"AI-040|AI-041|AI-042|AI-043"),"behavioral",match(search_name,"AI-006|AI-009|AI-010|AI-012|AI-019|AI-024") OR match(detection_id,"AI-006|AI-009|AI-010|AI-012|AI-019|AI-024"),"recon_access",true(),"other") | stats sum(risk_score) as total_risk dc(det_category) as unique_categories values(det_category) as categories values(search_name) as detections min(_time) as firstTime max(_time) as lastTime by risk_object | eval user=risk_object | eval control_name="multi_vector_categories" | lookup ai_detection_config control_name OUTPUTNEW value as cat_threshold | eval cat_threshold=coalesce(tonumber(cat_threshold),3) | where unique_categories>=cat_threshold | eval category_list=mvjoin(categories,",")
cron_schedule = */15 * * * *
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
alert.suppress = 1
alert.suppress.period = 4h
alert.suppress.fields = user
action.risk = 1
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score":"55"}]
action.risk.param._risk_message = Multi-vector AI risk for $user$: $unique_categories$ distinct categories ($category_list$) in 24h. Total risk: $total_risk$.
action.notable = 1
action.correlationsearch.label = AI-RISK-005: Multi-Vector AI Risk
action.notable.param.rule_title = Multi-Vector AI Risk Activity
action.notable.param.rule_description = User $user$ triggered $unique_categories$ distinct AI detection categories in 24 hours: $category_list$.
action.notable.param.security_domain = threat
action.notable.param.severity = high

