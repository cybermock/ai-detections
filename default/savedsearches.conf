description = Detect unsanctioned use of AI CLI tools including codex, claude, gemini, aider, sgpt, llm, tgpt, mods, fabric, aichat, amazon-q, openai, cline, and gh-copilot. MITRE: T1059
search = | tstats summariesonly=t allow_old_summaries=t count min(_time) as firstTime max(_time) as lastTime values(Processes.process) as process values(Processes.original_file_name) as original_file_name from datamodel=Endpoint.Processes where Processes.process_name IN ("codex","codex.exe","claude","claude.exe","gemini","gemini.exe","gh-copilot","gh-copilot.exe","aider","aider.exe","sgpt","sgpt.exe","llm","llm.exe","tgpt","tgpt.exe","mods","mods.exe","fabric","fabric.exe","aichat","aichat.exe","amazon-q","amazon-q.exe","openai","openai.exe","cline","cline.exe") by Processes.user Processes.dest Processes.process_name Processes.parent_process_name | rename Processes.* as * | eval user=coalesce(user,"unknown"), src=coalesce(dest,"unknown"), process_name_lc=lower(process_name), parent_process_name_lc=lower(coalesce(parent_process_name,"")) | `ai_process_filter` | eval provider=coalesce(provider,case(match(process_name_lc,"codex|openai"),"OpenAI",match(process_name_lc,"claude"),"Anthropic",match(process_name_lc,"gemini"),"Google Gemini",match(process_name_lc,"gh-copilot"),"Microsoft Copilot",match(process_name_lc,"aider"),"Aider",match(process_name_lc,"sgpt"),"Shell GPT",match(process_name_lc,"llm"),"LLM CLI",match(process_name_lc,"tgpt"),"tgpt",match(process_name_lc,"mods"),"Charm",match(process_name_lc,"fabric"),"Fabric",match(process_name_lc,"aichat"),"aichat",match(process_name_lc,"amazon-q"),"Amazon",match(process_name_lc,"cline"),"Cline",true(),"AI CLI")) | where usage_type="cli" OR (process_name_lc="claude.exe" AND match(parent_process_name_lc,"cmd|powershell|pwsh|bash|zsh|sh|terminal|wt|conhost")) | `ai_unsanctioned_filter(user,src,provider)` | eval ai_activity="cli_execution", detection_id="AI-004", mitre_attack="T1059", ai_kill_chain_phase="execution"
