[ai_domains_filter]
definition = eval ai_domain=lower(replace(coalesce(ai_domain,""),"^\\*\\.","")), ai_domain=replace(ai_domain,":\\d+$",""), ai_domain_base=replace(ai_domain,"^.*?([^.]+\\.[^.]+)$","\\1") | lookup ai_provider_domains domain as ai_domain OUTPUTNEW provider usage_type severity_weight enabled | lookup ai_provider_domains domain as ai_domain_base OUTPUTNEW provider as _provider_base usage_type as _usage_type_base severity_weight as _severity_weight_base enabled as _enabled_base | eval provider=coalesce(provider,_provider_base), usage_type=coalesce(usage_type,_usage_type_base), severity_weight=coalesce(severity_weight,_severity_weight_base), enabled=coalesce(enabled,_enabled_base) | eval _cloud_provider=case(match(ai_domain,"bedrock.*\.amazonaws\.com"),"AWS Bedrock",match(ai_domain,"aiplatform.*\.googleapis\.com"),"GCP Vertex AI",match(ai_domain,".*\.openai\.azure\.com"),"Azure OpenAI",match(ai_domain,".*\.ml\.cloud\.databricks\.com"),"Databricks",match(ai_domain,".*\.snowflakecomputing\.com"),"Snowflake Cortex",match(ai_domain,".*sagemaker.*\.amazonaws\.com"),"AWS SageMaker") | eval provider=coalesce(provider,_cloud_provider), usage_type=coalesce(usage_type,if(isnotnull(_cloud_provider),"api",null())), severity_weight=coalesce(severity_weight,if(isnotnull(_cloud_provider),"1.2",null())), enabled=coalesce(enabled,if(isnotnull(_cloud_provider),"1",null())) | where enabled=1
iseval = 0

[ai_unsanctioned_filter(3)]
args = user_field,system_field,provider_field
definition = eval _allow_day=relative_time(now(),"@d"), _allow_provider=lower(coalesce($provider_field$,"*")), _allow_group=lower(coalesce(user_group,user_category,category,bunit,"")), _allow_key_user=lower(coalesce($user_field$,""))."|"._allow_provider, _allow_key_user_any=lower(coalesce($user_field$,""))."|*", _allow_key_system=lower(coalesce($system_field$,""))."|"._allow_provider, _allow_key_system_any=lower(coalesce($system_field$,""))."|*", _allow_key_group=_allow_group."|"._allow_provider, _allow_key_group_any=_allow_group."|*" | lookup ai_sanctioned_entities allow_key as _allow_key_user OUTPUTNEW allow_key as _allow_user enabled as _allow_user_enabled expires as _allow_user_expires | lookup ai_sanctioned_entities allow_key as _allow_key_user_any OUTPUTNEW allow_key as _allow_user_any enabled as _allow_user_any_enabled expires as _allow_user_any_expires | lookup ai_sanctioned_entities allow_key as _allow_key_system OUTPUTNEW allow_key as _allow_system enabled as _allow_system_enabled expires as _allow_system_expires | lookup ai_sanctioned_entities allow_key as _allow_key_system_any OUTPUTNEW allow_key as _allow_system_any enabled as _allow_system_any_enabled expires as _allow_system_any_expires | lookup ai_sanctioned_entities allow_key as _allow_key_group OUTPUTNEW allow_key as _allow_group_match enabled as _allow_group_enabled expires as _allow_group_expires | lookup ai_sanctioned_entities allow_key as _allow_key_group_any OUTPUTNEW allow_key as _allow_group_any_match enabled as _allow_group_any_enabled expires as _allow_group_any_expires | eval _allow_user_active=if(isnotnull(_allow_user) AND coalesce(tonumber(_allow_user_enabled),1)=1 AND (isnull(_allow_user_expires) OR _allow_user_expires="" OR strptime(_allow_user_expires,"%Y-%m-%d")>=_allow_day),1,0), _allow_user_any_active=if(isnotnull(_allow_user_any) AND coalesce(tonumber(_allow_user_any_enabled),1)=1 AND (isnull(_allow_user_any_expires) OR _allow_user_any_expires="" OR strptime(_allow_user_any_expires,"%Y-%m-%d")>=_allow_day),1,0), _allow_system_active=if(isnotnull(_allow_system) AND coalesce(tonumber(_allow_system_enabled),1)=1 AND (isnull(_allow_system_expires) OR _allow_system_expires="" OR strptime(_allow_system_expires,"%Y-%m-%d")>=_allow_day),1,0), _allow_system_any_active=if(isnotnull(_allow_system_any) AND coalesce(tonumber(_allow_system_any_enabled),1)=1 AND (isnull(_allow_system_any_expires) OR _allow_system_any_expires="" OR strptime(_allow_system_any_expires,"%Y-%m-%d")>=_allow_day),1,0), _allow_group_active=if(_allow_group!="" AND isnotnull(_allow_group_match) AND coalesce(tonumber(_allow_group_enabled),1)=1 AND (isnull(_allow_group_expires) OR _allow_group_expires="" OR strptime(_allow_group_expires,"%Y-%m-%d")>=_allow_day),1,0), _allow_group_any_active=if(_allow_group!="" AND isnotnull(_allow_group_any_match) AND coalesce(tonumber(_allow_group_any_enabled),1)=1 AND (isnull(_allow_group_any_expires) OR _allow_group_any_expires="" OR strptime(_allow_group_any_expires,"%Y-%m-%d")>=_allow_day),1,0) | where _allow_user_active=0 AND _allow_user_any_active=0 AND _allow_system_active=0 AND _allow_system_any_active=0 AND _allow_group_active=0 AND _allow_group_any_active=0
iseval = 0

[ai_process_filter]
definition = lookup ai_tool_processes process_name_lc as process_name_lc OUTPUTNEW tool provider usage_type platform enabled | where enabled=1
iseval = 0

[ai_prompt_injection_patterns_enabled]
definition = inputlookup ai_prompt_injection_patterns | where enabled=1 | fields pattern_id pattern severity
iseval = 0

[ai_api_key_patterns_enabled]
definition = inputlookup ai_api_key_patterns | where enabled=1 | fields pattern_id provider regex_pattern severity
iseval = 0

[ai_risk_defaults(1)]
args = control_name
definition = [| inputlookup ai_detection_config | search control_name="$control_name$" | head 1 | return $value]
iseval = 0

[ai_risk_multiplier]
definition = lookup identity_lookup_expanded identity as user OUTPUT department as _dept | eval _dept=lower(coalesce(_dept,"general")) | lookup ai_department_sensitivity department as _dept OUTPUTNEW sensitivity_level as _sensitivity_level risk_multiplier as _risk_multiplier | eval _risk_multiplier=coalesce(tonumber(_risk_multiplier),1.0) | lookup identity_lookup_expanded identity as user OUTPUT category as _user_cat priority as _user_pri | eval _priv_mult=if(_user_cat="privileged" OR _user_pri="critical",1.5,1.0), _final_multiplier=_risk_multiplier*_priv_mult
iseval = 0
