### ============================================================================
### KV Store Collections for AI RBA Starter Pack
### ============================================================================
### These collections provide KV Store-backed alternatives to CSV lookups.
### KV Store scales better for large or frequently-updated operational data.
### To migrate from CSV to KV Store:
###   1. Populate the collection via REST API or inputlookup/outputlookup
###   2. Update transforms.conf to point to the KV Store collection
###   3. Remove or archive the CSV file
### ============================================================================

[ai_sanctioned_entities_collection]
enforceTypes = true
field.entity_type = string
field.entity = string
field.provider = string
field.scope = string
field.expires = string
field.enabled = string
field.allow_key = string

